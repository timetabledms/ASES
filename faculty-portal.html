<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ASES — My Portal</title>
  
  <link rel="stylesheet" href="/css/theme.css" />
  
  <style>
    /* ── Portal Specific Styles ───────────────────────────────── */
    .portal-top {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
    }
    
    .welcome-display { display: flex; flex-direction: column; gap: 0.4rem; }
    .welcome-title { font-family: var(--ff-display); font-size: 2.2rem; font-weight: 700; color: var(--text-primary); line-height: 1.1; letter-spacing: -0.01em; }
    .welcome-subtitle { font-size: 0.95rem; color: var(--text-muted); font-weight: 500; }
    
    .date-badge { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; background: var(--bg-card); border: 1px solid var(--border); box-shadow: 0 2px 6px rgba(0,0,0,0.02); color: var(--text-primary); border-radius: 8px; font-size: 0.85rem; font-weight: 600; }
    .date-badge svg { width: 16px; height: 16px; color: var(--accent); }

    /* Stat Cards */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.25rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02); position: relative; overflow: hidden;
    }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
    .stat-card.blue::before { background: var(--accent); }
    .stat-card.green::before { background: var(--success); }
    .stat-card.yellow::before { background: #eab308; }
    
    .stat-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
    .stat-value { font-family: var(--ff-display); font-size: 2.5rem; font-weight: 400; color: var(--text-primary); line-height: 1; margin: 0.25rem 0; }
    .stat-desc { font-size: 0.75rem; color: var(--text-muted); }

    /* Layout Grid */
    .portal-grid {
      display: grid; grid-template-columns: 1.2fr 1fr; gap: 1.5rem;
    }
    @media (max-width: 1024px) { .portal-grid { grid-template-columns: 1fr; } }
    
    .panel-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02); display: flex; flex-direction: column; overflow: hidden;
    }
    .panel-header {
      padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); background: rgba(26, 34, 68, 0.02);
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel-title { font-weight: 700; font-size: 1.05rem; color: var(--text-primary); display: flex; align-items: center; gap: 0.5rem; }
    .panel-title svg { width: 18px; height: 18px; color: var(--accent); }
    
    /* Timeline (Today's Schedule) */
    .timeline { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; flex: 1; overflow-y: auto; max-height: 500px; }
    .timeline-empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 0.95rem; font-style: italic; }
    
    .tl-item { display: flex; gap: 1rem; position: relative; }
    .tl-item:not(:last-child)::after {
      content: ''; position: absolute; left: 47px; top: 32px; bottom: -1.5rem;
      width: 2px; background: var(--border); opacity: 0.5;
    }
    .tl-time { width: 90px; text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; padding-top: 0.2rem; }
    .tl-time strong { font-size: 0.85rem; color: var(--text-primary); font-weight: 700; }
    .tl-time span { font-size: 0.7rem; color: var(--text-muted); font-weight: 500; }
    
    .tl-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg-card); box-shadow: 0 0 0 2px var(--accent); margin-top: 0.45rem; flex-shrink: 0; position: relative; z-index: 2; }
    .tl-dot.cancelled { background: var(--border); box-shadow: 0 0 0 2px var(--border); }
    .tl-dot.break { background: #f59e0b; box-shadow: 0 0 0 2px #f59e0b; }
    
    .tl-content { background: var(--bg-input); border: 1px solid var(--border); padding: 1rem 1.25rem; border-radius: 10px; flex: 1; }
    .tl-content.cancelled { opacity: 0.6; text-decoration: line-through; }
    .tl-course { font-size: 0.75rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .tl-subject { font-size: 1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.4rem; }
    .tl-room { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.8rem; color: var(--text-muted); font-weight: 500; background: var(--bg-card); padding: 0.2rem 0.5rem; border-radius: 4px; border: 1px solid var(--border); }
    
    /* History Lists */
    .history-list { padding: 0; margin: 0; list-style: none; flex: 1; overflow-y: auto; max-height: 250px; }
    .hl-item { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .hl-item:last-child { border-bottom: none; }
    .hl-item:hover { background: rgba(0,0,0,0.01); }
    .hl-main { display: flex; flex-direction: column; gap: 0.2rem; }
    .hl-title { font-weight: 600; font-size: 0.85rem; color: var(--text-primary); }
    .hl-date { font-size: 0.75rem; color: var(--text-muted); }
    .hl-badge { font-size: 0.7rem; font-weight: 700; padding: 0.25rem 0.6rem; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }

    /* Status Colors */
    .bg-green { background: #dcfce7; color: #059669; }
    .bg-red { background: #fee2e2; color: #dc2626; }
    .bg-amber { background: #fef3c7; color: #d97706; }
    .bg-gray { background: #f1f5f9; color: #475569; }

    .error-state { padding: 4rem; text-align: center; }
    .error-state svg { width: 48px; height: 48px; color: var(--error); margin-bottom: 1rem; opacity: 0.8; }
    .error-state h2 { font-family: var(--ff-display); font-size: 1.5rem; margin-bottom: 0.5rem; }
    .error-state p { color: var(--text-muted); font-size: 0.95rem; max-width: 400px; margin: 0 auto; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-college" id="sidebarCollege"></div>
  <nav id="sideNav"></nav>
  <div class="sidebar-footer">
    <div class="theme-row">
      <span class="theme-label"><span id="themeIcon"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span><span id="themeLabel">Light mode</span></span>
      <label class="toggle-switch"><input type="checkbox" id="themeToggle"/><span class="toggle-track"></span></label>
    </div>
    <div class="user-pill">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info"><div class="user-name" id="userName">…</div><div class="user-role" id="userRole">Faculty</div></div>
      <button class="btn-logout" id="logoutBtn" title="Sign out"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div>
      <h1 class="page-title">My Portal</h1>
      <p class="page-subtitle">View your daily schedule and execution history</p>
    </div>
  </div>
  
  <div class="content" id="mainContent">
    <div style="text-align:center; padding:4rem;"><span class="spin"></span> Loading portal...</div>
  </div>
</main>

<script type="module">
  import { getSession } from '/js/auth/session.js';
  import { initSidebar } from '/js/components/sidebar.js';
  import { supabase } from '/js/config/supabase.js';

  const STATUS_LABELS = { on_time: 'On Time', late: 'Late', not_engaged: 'Not Engaged', not_marked: 'Not Marked' };
  const LEAVE_LABELS = { cl: 'Casual Leave', dl: 'Duty Leave', ml: 'Medical Leave', lwp: 'Leave Without Pay' };

  (async () => {
    const session = await getSession();
    if (!session) { window.location.href = '/index.html'; return; }
    
    initSidebar(session, 'faculty-portal');

    let facultyId = session.profile?.faculty_id;
    let facultyName = session.profile?.full_name || 'Professor';
    const content = document.getElementById('mainContent');

    // --- PRECISE LOOKUP: Find faculty record by matching auth user_id or email ---
    if (!facultyId) {
      // Depending on how getSession is structured, user id is usually here:
      const userId = session.user?.id || session.id; 
      const userEmail = session.user?.email || session.profile?.email;
      
      try {
        // 1. Try matching the user_id column in the faculty table
        let { data: facMatch } = await supabase
          .from('faculty')
          .select('id, full_name')
          .eq('user_id', userId)
          .maybeSingle();

        // 2. If user_id wasn't found, fallback to matching the exact email address
        if (!facMatch && userEmail) {
          const { data: emailMatch } = await supabase
            .from('faculty')
            .select('id, full_name')
            .eq('email', userEmail)
            .maybeSingle();
          facMatch = emailMatch;
        }
          
        // 3. Apply the matched Faculty ID
        if (facMatch) {
          facultyId = facMatch.id;
          facultyName = facMatch.full_name;
        }
      } catch(e) { 
        console.warn("Faculty link lookup failed:", e); 
      }
    }

    // --- ADMIN PREVIEW (Testing Fallback) ---
    let isAdminPreview = false;
    if (!facultyId && (session.role === 'admin' || session.role === 'super_admin')) {
      const { data: firstFac } = await supabase.from('faculty').select('id, full_name').limit(1).maybeSingle();
      if (firstFac) {
        facultyId = firstFac.id;
        facultyName = firstFac.full_name;
        isAdminPreview = true;
      }
    }

    // If absolutely no faculty record is found, show lock screen
    if (!facultyId) {
      content.innerHTML = `
        <div class="error-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <h2>No Faculty Profile Linked</h2>
          <p>Your user account is not linked to a Faculty profile in the system. Contact your administrator to ensure your Auth ID is mapped to your Faculty record.</p>
        </div>
      `;
      return;
    }

    const todayStr = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD
    const displayDate = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    try {
      // 1. Fetch Today's Schedule
      const { data: scheduleData, error: sErr } = await supabase.from('daily_schedule')
        .select(`
          id, schedule_date, is_cancelled,
          time_slot:time_slot_id(start_time, end_time, slot_label, slot_type, sort_order),
          room:room_id(room_code),
          course:course_id(year, program, division),
          subject:subject_id(subject_name)
        `)
        .eq('assigned_faculty_id', facultyId)
        .eq('schedule_date', todayStr);
      if (sErr) throw sErr;

      // Filter and sort schedule
      const lecturesToday = (scheduleData || []).filter(s => s.time_slot?.slot_type === 'lecture');
      lecturesToday.sort((a,b) => (a.time_slot?.sort_order || 0) - (b.time_slot?.sort_order || 0));

      const activeLecturesCount = lecturesToday.filter(s => !s.is_cancelled).length;

      // 2. Fetch Recent Executions (Last 30 days)
      const thirtyDaysAgo = new Date();
      thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
      
      const { data: myExecsRaw, error: meErr } = await supabase
        .from('lecture_execution')
        .select(`schedule_date, faculty_status, daily_schedule!inner(assigned_faculty_id, subject:subject_id(subject_name))`)
        .eq('daily_schedule.assigned_faculty_id', facultyId)
        .gte('schedule_date', thirtyDaysAgo.toLocaleDateString('en-CA'))
        .order('schedule_date', { ascending: false })
        .limit(10);
      
      const myExecs = myExecsRaw || [];
      const lateCount = myExecs.filter(e => e.faculty_status === 'late').length;

      // 3. Fetch Recent Leaves
      const { data: myLeaves, error: lErr } = await supabase.from('faculty_leaves')
        .select('leave_date, leave_type, status')
        .eq('faculty_id', facultyId)
        .order('leave_date', { ascending: false })
        .limit(10);
      
      const approvedLeavesCount = (myLeaves || []).filter(l => l.status === 'approved').length;

      // Build UI
      let html = `
        <div class="portal-top">
          <div class="welcome-display">
            <div class="welcome-title">Welcome back, ${facultyName.split(' ')[0]}</div>
            <div class="welcome-subtitle">${isAdminPreview ? '<span style="color:var(--error); font-weight:bold;">[ADMIN PREVIEW]</span> Viewing as ' + facultyName : 'Here is your professional summary for today.'}</div>
          </div>
          <div class="date-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${displayDate}
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card blue">
            <div class="stat-label">Scheduled Today</div>
            <div class="stat-value">${activeLecturesCount}</div>
            <div class="stat-desc">active lecture slots</div>
          </div>
          <div class="stat-card yellow">
            <div class="stat-label">Late Marks (Recent)</div>
            <div class="stat-value">${lateCount}</div>
            <div class="stat-desc">in the last 10 records</div>
          </div>
          <div class="stat-card green">
            <div class="stat-label">Leaves Taken</div>
            <div class="stat-value">${approvedLeavesCount}</div>
            <div class="stat-desc">approved records found</div>
          </div>
        </div>

        <div class="portal-grid">
          <!-- Left: Today's Timeline -->
          <div class="panel-card">
            <div class="panel-header">
              <div class="panel-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Today's Schedule
              </div>
            </div>
            <div class="timeline">
      `;

      if (lecturesToday.length === 0) {
        html += `<div class="timeline-empty">You have no lectures scheduled for today.<br/>Enjoy your day!</div>`;
      } else {
        lecturesToday.forEach(lec => {
          const t = lec.time_slot;
          const sTime = t.start_time.slice(0,5);
          const eTime = t.end_time.slice(0,5);
          const cName = lec.course ? (lec.course.division ? `${lec.course.year} ${lec.course.program} ${lec.course.division}` : `${lec.course.year} ${lec.course.program}`) : 'Unknown Course';
          const sName = lec.subject?.subject_name || 'Unknown Subject';
          const rCode = lec.room?.room_code || 'TBA';
          
          if (lec.is_cancelled) {
            html += `
              <div class="tl-item">
                <div class="tl-time"><strong>${sTime}</strong><span>${eTime}</span></div>
                <div class="tl-dot cancelled"></div>
                <div class="tl-content cancelled">
                  <div class="tl-course">CANCELLED</div>
                  <div class="tl-subject">${sName}</div>
                  <div class="tl-room">Room ${rCode}</div>
                </div>
              </div>
            `;
          } else {
            html += `
              <div class="tl-item">
                <div class="tl-time"><strong>${sTime}</strong><span>${eTime}</span></div>
                <div class="tl-dot"></div>
                <div class="tl-content">
                  <div class="tl-course">${cName}</div>
                  <div class="tl-subject">${sName}</div>
                  <div class="tl-room">
                    <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    Room ${rCode}
                  </div>
                </div>
              </div>
            `;
          }
        });
      }

      html += `
            </div>
          </div>

          <!-- Right: History Splits -->
          <div style="display:flex; flex-direction:column; gap:1.5rem;">
            
            <!-- Execution History -->
            <div class="panel-card" style="flex:1;">
              <div class="panel-header">
                <div class="panel-title">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                  Recent Executions
                </div>
              </div>
              <ul class="history-list">
      `;

      if (myExecs.length === 0) {
        html += `<li class="hl-item" style="justify-content:center; color:var(--text-muted); padding: 2rem;">No recent executions recorded.</li>`;
      } else {
        myExecs.forEach(ex => {
          const sName = ex.daily_schedule?.subject?.subject_name || 'Subject';
          const fDate = new Date(ex.schedule_date).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
          let bgClass = 'bg-gray';
          if(ex.faculty_status === 'on_time') bgClass = 'bg-green';
          else if(ex.faculty_status === 'late') bgClass = 'bg-amber';
          else if(ex.faculty_status === 'not_engaged') bgClass = 'bg-red';

          html += `
            <li class="hl-item">
              <div class="hl-main">
                <span class="hl-title">${sName}</span>
                <span class="hl-date">${fDate}</span>
              </div>
              <span class="hl-badge ${bgClass}">${STATUS_LABELS[ex.faculty_status] || 'Unknown'}</span>
            </li>
          `;
        });
      }

      html += `
              </ul>
            </div>

            <!-- Leave History -->
            <div class="panel-card" style="flex:1;">
              <div class="panel-header">
                <div class="panel-title">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  Leave Status
                </div>
              </div>
              <ul class="history-list">
      `;

      if (myLeaves.length === 0) {
        html += `<li class="hl-item" style="justify-content:center; color:var(--text-muted); padding: 2rem;">No leave history found.</li>`;
      } else {
        myLeaves.forEach(lv => {
          const lName = LEAVE_LABELS[lv.leave_type] || lv.leave_type.toUpperCase();
          const fDate = new Date(lv.leave_date).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
          let bgClass = 'bg-gray';
          if(lv.status === 'approved') bgClass = 'bg-green';
          else if(lv.status === 'rejected') bgClass = 'bg-red';
          else if(lv.status === 'pending') bgClass = 'bg-amber';

          html += `
            <li class="hl-item">
              <div class="hl-main">
                <span class="hl-title">${lName}</span>
                <span class="hl-date">${fDate}</span>
              </div>
              <span class="hl-badge ${bgClass}">${lv.status.toUpperCase()}</span>
            </li>
          `;
        });
      }

      html += `
              </ul>
            </div>

          </div>
        </div>
      `;

      content.innerHTML = html;

    } catch (e) {
      console.error(e);
      content.innerHTML = `
        <div class="error-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <h2>Error Loading Portal</h2>
          <p>We encountered an issue fetching your data. Please check your console for details, or contact support.</p>
        </div>
      `;
    }

  })();
</script>
</body>
</html>
