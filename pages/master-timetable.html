<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ASES — Master Timetable</title>
  
  <link rel="stylesheet" href="/css/theme.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css"/>
  
  <style>
    /* Page-specific overrides */
    .ts-wrapper.single .ts-control {
      display: flex !important; flex-wrap: nowrap !important; align-items: center; overflow: hidden !important;
    }
    .ts-wrapper.single .ts-control .item {
      white-space: nowrap !important; overflow: hidden !important; text-overflow: ellipsis !important; max-width: 95% !important; pointer-events: none;
    }
    .ts-wrapper.single .ts-control input { min-width: 0 !important; }

    /* day-type toggle */
    .day-toggle{display:flex;gap:.5rem;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:.3rem; transition: background .25s, border-color .25s;}
    .day-btn{flex:1;padding:.55rem 1.25rem;border:none;border-radius:8px;font-family:var(--ff-body);font-size:.88rem;font-weight:500;cursor:pointer;background:transparent;color:var(--text-muted);transition:background .2s,color .2s}
    .day-btn.active{background:var(--accent);color:#fff}
    
    /* grid container */
    .grid-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;overflow:hidden;min-width:700px; transition: background .25s, border-color .25s;}
    .grid-header{display:grid;border-bottom:1px solid var(--border);background:rgba(127,127,200,.04); transition: border-color .25s;}
    .gh-cell{padding:.6rem .75rem;font-size:.67rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);border-right:1px solid var(--border); transition: border-color .25s;}
    .gh-cell:last-child{border-right:none}
    
    .slot-row{display:grid;border-bottom:1px solid rgba(37,41,53,.5)}
    [data-theme="light"] .slot-row { border-bottom-color: rgba(200,210,230,.4); }
    .slot-row:last-child{border-bottom:none}
    .slot-row.is-break{background:rgba(127,127,200,.03)}
    
    .slot-time{padding:.5rem .65rem;font-size:.7rem;color:var(--text-muted);border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;min-width:88px; transition: border-color .25s;}
    .slot-time .tl{font-weight:600;font-size:.72rem;color:var(--text-label)}
    .slot-time .tr{font-size:.65rem}
    .break-label{padding:.4rem .65rem;font-size:.72rem;font-style:italic;color:var(--text-muted);display:flex;align-items:center}
    
    /* lecture cell */
    .cell{padding:.45rem .5rem;border-right:1px solid var(--border);min-height:62px;cursor:pointer;position:relative;transition:background .15s, border-color .25s;}
    .cell:last-child{border-right:none}
    .cell:hover{background:var(--bg-hover)}
    .cell.filled{background:rgba(79,106,245,.06)}
    .cell.filled:hover{background:rgba(79,106,245,.12)}
    
    .cell-course{font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted)}
    .cell-subject{font-size:.78rem;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; transition: color .25s;}
    .cell-faculty{font-size:.7rem;color:var(--text-muted)}
    .cell-add{display:flex;align-items:center;justify-content:center;height:100%;color:var(--border);transition:color .15s}
    .cell:hover .cell-add{color:var(--accent)}
    .cell-add svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    
    /* placeholder */
    .grid-placeholder{padding:4rem;text-align:center;color:var(--text-muted);display:flex;flex-direction:column;align-items:center;gap:1rem}
    .grid-placeholder svg{width:36px;height:36px;stroke:var(--border);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

    /* Export Actions */
    .export-actions { display: flex; gap: 0.5rem; }
    .btn-export {
      display: inline-flex; align-items: center; gap: 6px; padding: 0.55rem 1rem; border: 1px solid var(--border);
      border-radius: 8px; font-family: var(--ff-body); font-size: 0.82rem; font-weight: 500; cursor: pointer;
      background: var(--bg-card); color: var(--text-primary); transition: background 0.2s, border-color 0.2s;
    }
    .btn-export:hover { background: var(--bg-hover); }
    .btn-export svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-college" id="sidebarCollege"></div>
  <nav id="sideNav"></nav>
  <div class="sidebar-footer">
    <div class="theme-row">
      <span class="theme-label">
        <span id="themeIcon"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
        <span id="themeLabel">Light mode</span>
      </span>
      <label class="toggle-switch"><input type="checkbox" id="themeToggle"/><span class="toggle-track"></span></label>
    </div>
    <div class="user-pill">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info"><div class="user-name" id="userName">…</div><div class="user-role" id="userRole">admin</div></div>
      <button class="btn-logout" id="logoutBtn" title="Sign out">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar" style="flex-wrap: wrap; gap: 1rem;">
    <div>
      <h1 class="page-title">Master Timetable</h1>
      <p class="page-subtitle">Edit the fixed weekly timetable — click any cell to assign or change</p>
    </div>
    <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
      <div class="day-toggle" style="flex-wrap:wrap">
        <button class="day-btn active" data-day="monday">Monday</button>
        <button class="day-btn" data-day="tuesday">Tuesday</button>
        <button class="day-btn" data-day="wednesday">Wednesday</button>
        <button class="day-btn" data-day="thursday">Thursday</button>
        <button class="day-btn" data-day="friday">Friday</button>
        <button class="day-btn" data-day="saturday">Saturday</button>
      </div>
      
      <div class="export-actions">
        <button class="btn-export" id="exportExcelBtn" title="Export to Merged Excel">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          Excel
        </button>
        <button class="btn-export" id="exportPdfBtn" title="Export to Vector PDF">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          PDF
        </button>
        <button class="btn-export" id="exportPngBtn" title="Download High-Res HQ Image">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
          PNG
        </button>
      </div>
    </div>
  </div>
  <div class="content">
    <div id="gridContainer">
      <div class="grid-placeholder grid-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <div>Loading timetable…</div>
      </div>
    </div>
  </div>
</main>

<div class="modal-back" id="cellModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modalTitle">Assign Lecture</div>
        <div class="modal-sub" id="modalSub"></div>
      </div>
      <button class="modal-close" id="modalClose"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Course *</label>
        <select id="modalCourse"><option value="">— select course —</option></select>
      </div>
      <div class="field" id="csfField" style="display:none">
        <label>Subject &amp; Faculty *</label>
        <select id="modalCSF"><option value="">— select subject / faculty —</option></select>
        <div class="field-hint">Selecting this auto-assigns subject and faculty.</div>
      </div>
      <div id="loadingCSF" style="display:none;font-size:.82rem;color:var(--text-muted);padding:.5rem 0">
        <span class="spin" style="display: inline-block;"></span> Loading options…
      </div>
    </div>
    <div class="modal-footer">
      <div>
        <button class="btn btn-danger btn-sm" id="clearCellBtn" style="display:none">
          <svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>Clear Cell
        </button>
      </div>
      <div style="display:flex;gap:.75rem">
        <button class="btn btn-ghost btn-sm" id="modalCancel">Cancel</button>
        <button class="btn btn-primary btn-sm" id="modalSave" disabled>
          <svg viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg>Save
        </button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.6.0/dist/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<script type="module">
  import { requireRole } from '../js/auth/session.js';
  import { initSidebar } from '../js/components/sidebar.js';
  import {
    getTimeSlots, getActiveRooms, getMasterTimetable,
    upsertMasterEntry, clearMasterEntry,
    getCSFForCourse, getAllActiveCourses
  } from '../js/modules/masterTimetable.js';
  import { preloadLogoForPDF } from '../js/utils/exportHelpers.js';

  const session = await requireRole('admin');
  initSidebar(session, 'timetable');
  preloadLogoForPDF(); // Fetches and caches College Logo as Base64 for the PDF/PNG headers

  function toast(msg, type='success') {
    const c = document.getElementById('toast');
    const el = document.createElement('div'); el.className = `toast-item ${type}`; el.textContent = msg;
    c.appendChild(el); setTimeout(() => el.remove(), 4000);
  }

  // ── State ──────────────────────────────────────────────────────────
  let currentDayType = 'monday';
  function slotDayType(day) { return day === 'saturday' ? 'saturday' : 'weekday'; }
  let courses = [], timeSlots = [], rooms = [], ttMap = {};
  
  let modalTimeSlotId = null, modalRoomId = null, modalRoomCode = '';
  let existingEntry = null, tsCourse = null, tsCSF = null, csfOptions = [];

  // ── Day type toggle ────────────────────────────────────────────────
  document.querySelectorAll('.day-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentDayType = btn.dataset.day;
      loadGrid();
    });
  });

  // ── Load & Render Grid ─────────────────────────────────────────────
  async function loadGrid() {
    document.getElementById('gridContainer').innerHTML =
      '<div class="grid-placeholder grid-wrap"><div><span class="spin" style="display:inline-block; border-color:var(--text-muted); border-top-color:transparent;"></span> Loading…</div></div>';
    try {
      [courses, timeSlots, rooms, ttMap] = await Promise.all([
        getAllActiveCourses(), getTimeSlots(slotDayType(currentDayType)),
        getActiveRooms(), getMasterTimetable(currentDayType),
      ]);
      renderGrid();
    } catch(e) {
      toast(e.message, 'error');
      document.getElementById('gridContainer').innerHTML = '<div class="grid-placeholder grid-wrap"><div>Failed to load timetable.</div></div>';
    }
  }

  function renderGrid() {
    const colCount  = 1 + rooms.length;
    const gridStyle = `grid-template-columns: 88px repeat(${rooms.length}, minmax(110px,1fr))`;

    let html = `<div class="grid-wrap"><div class="grid-header" style="${gridStyle}">
      <div class="gh-cell">Time</div>
      ${rooms.map(r => `<div class="gh-cell">Room ${r.room_code}</div>`).join('')}
    </div>`;

    for (const slot of timeSlots) {
      html += `<div class="slot-row${slot.slot_type !== 'lecture' ? ' is-break' : ''}" style="${gridStyle}">`;
      html += `<div class="slot-time"><span class="tl">${slot.slot_label}</span><span class="tr">${slot.start_time.slice(0,5)}–${slot.end_time.slice(0,5)}</span></div>`;

      if (slot.slot_type !== 'lecture') {
        const lbl = slot.slot_type === 'lunch' ? '🍽 Lunch' : '☕ Recess';
        html += `<div class="break-label" style="grid-column:2/${colCount+1}">${lbl}</div>`;
      } else {
        for (const room of rooms) {
          const entry = ttMap[slot.id]?.[room.id];
          if (entry) {
            const courseLbl = entry.course
              ? (entry.course.division ? `${entry.course.year} ${entry.course.program} ${entry.course.division}` : `${entry.course.year} ${entry.course.program}`) : '—';
            html += `<div class="cell filled" data-ts="${slot.id}" data-room="${room.id}" data-entry="${entry.id}">
              <div class="cell-course">${courseLbl}</div>
              <div class="cell-subject">${entry.subject?.subject_name ?? '—'}</div>
              <div class="cell-faculty">${entry.faculty?.full_name ?? '—'}</div>
            </div>`;
          } else {
            html += `<div class="cell" data-ts="${slot.id}" data-room="${room.id}">
              <div class="cell-add"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
            </div>`;
          }
        }
      }
      html += '</div>';
    }
    html += '</div>';
    document.getElementById('gridContainer').innerHTML = html;

    document.querySelectorAll('.cell[data-ts]').forEach(cell => {
      cell.addEventListener('click', () => openModal(cell.dataset.ts, cell.dataset.room, cell.dataset.entry));
    });
  }

  // ── EXPORT EXCEL (With Clean Merges) ─────────────────────────────────
  document.getElementById('exportExcelBtn').addEventListener('click', () => {
    try {
      if (!window.XLSX) return toast('Excel library not loaded.', 'error');
      
      const wb = window.XLSX.utils.book_new();
      const wsData = [];
      const merges = [];
      
      // Setup Headers
      const headers = ['Time Slot', ...rooms.map(r => `Room ${r.room_code}`)];
      wsData.push(headers);
      
      let rIdx = 1; // Tracks current row array index
      
      timeSlots.forEach(slot => {
        const timeLabel = `${slot.slot_label}\n(${slot.start_time.slice(0, 5)} - ${slot.end_time.slice(0, 5)})`;
        
        if (slot.slot_type !== 'lecture') {
          const breakRow = [timeLabel, slot.slot_type === 'lunch' ? 'Lunch Break' : 'Recess'];
          wsData.push(breakRow);
          // Merge horizontal across all room columns
          merges.push({ s: { r: rIdx, c: 1 }, e: { r: rIdx, c: rooms.length } });
          rIdx += 1;
        } else {
          // Three distinct rows for structural clarity in Excel
          const rowCourse = [timeLabel];
          const rowSubject = ['']; // Time slot is blank here but will be covered by the vertical merge
          const rowFaculty = ['']; 

          rooms.forEach(r => {
            const entry = ttMap[slot.id]?.[r.id];
            if (entry) {
              rowCourse.push(entry.course ? `${entry.course.year} ${entry.course.program} ${entry.course.division || ''}`.trim() : '—');
              rowSubject.push(entry.subject?.subject_name ?? '');
              rowFaculty.push(entry.faculty?.full_name ? `Prof. ${entry.faculty.full_name}` : '');
            } else {
              rowCourse.push('—'); rowSubject.push(''); rowFaculty.push('');
            }
          });
          
          wsData.push(rowCourse, rowSubject, rowFaculty);
          // Vertically merge the Time Slot column so it elegantly covers the 3 separated lecture rows
          merges.push({ s: { r: rIdx, c: 0 }, e: { r: rIdx + 2, c: 0 } });
          rIdx += 3;
        }
      });

      const ws = window.XLSX.utils.aoa_to_sheet(wsData);
      ws['!merges'] = merges;
      ws['!cols'] = [{ wch: 18 }, ...rooms.map(() => ({ wch: 25 }))]; // Clean column widths

      window.XLSX.utils.book_append_sheet(wb, ws, "Timetable");
      const friendlyDay = currentDayType.charAt(0).toUpperCase() + currentDayType.slice(1);
      window.XLSX.writeFile(wb, `Master_Timetable_${friendlyDay}.xlsx`);
      
      toast(`Exported ${friendlyDay} timetable to Excel.`);
    } catch (e) {
      console.error(e);
      toast('Failed to export to Excel.', 'error');
    }
  });

  // ── EXPORT PDF (With Native UI-like Merges) ────────────────────────
  document.getElementById('exportPdfBtn').addEventListener('click', () => {
    try {
      if (!window.jspdf) return toast('PDF library not loaded.', 'error');
      
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('landscape', 'mm', 'a4');
      const cx = doc.internal.pageSize.getWidth() / 2;
      const friendlyDay = currentDayType.charAt(0).toUpperCase() + currentDayType.slice(1);

      // 1. Draw Professional Vector Header
      if (window._ASES_LOGO_DATA) {
        try { doc.addImage(window._ASES_LOGO_DATA, 'PNG', 14, 8, 26, 26); } catch(e) {}
      }
      doc.setFont('times', 'bold'); doc.setFontSize(16); doc.setTextColor(26, 34, 68);
      doc.text('B. K. Birla College, Kalyan', cx, 16, { align: 'center' });
      doc.setFont('times', 'normal'); doc.setFontSize(10); doc.setTextColor(50, 60, 90);
      doc.text('(Empowered Autonomous Status)', cx, 22, { align: 'center' });
      doc.setFont('times', 'bolditalic'); doc.setFontSize(11);
      doc.text('Department of Management Studies', cx, 28, { align: 'center' });
      doc.setFont('helvetica', 'bold'); doc.setFontSize(12); doc.setTextColor(26, 34, 68);
      doc.text(`Master Timetable — ${friendlyDay}`, cx, 38, { align: 'center' });

      // 2. Prepare Vector Map
      const headers = ['Time Slot', ...rooms.map(r => `Room ${r.room_code}`)];
      const dataRows = [];
      
      timeSlots.forEach(slot => {
        const timeStr = `${slot.slot_label}\n(${slot.start_time.slice(0, 5)} - ${slot.end_time.slice(0, 5)})`;
        if (slot.slot_type !== 'lecture') {
          // Utilizing AutoTable's colSpan allows "Lunch Break" to stretch across nicely
          dataRows.push([
            timeStr,
            { content: slot.slot_type === 'lunch' ? 'Lunch Break' : 'Recess', colSpan: rooms.length, 
              styles: { halign: 'center', fontStyle: 'italic', fillColor: [240, 242, 248], textColor: [100, 110, 130] } }
          ]);
        } else {
          const row = [timeStr];
          rooms.forEach(r => {
            const entry = ttMap[slot.id]?.[r.id];
            if (entry) {
              const cStr = entry.course ? `${entry.course.year} ${entry.course.program} ${entry.course.division || ''}`.trim() : '';
              const sStr = entry.subject?.subject_name ?? '';
              const fStr = entry.faculty?.full_name ? `Prof. ${entry.faculty.full_name}` : '';
              row.push(`${cStr}\n${sStr}\n${fStr}`.trim()); // Native wrapping
            } else { row.push('—'); }
          });
          dataRows.push(row);
        }
      });

      // 3. Render AutoTable
      doc.autoTable({
        startY: 44,
        head: [headers],
        body: dataRows,
        theme: 'grid',
        styles: { fontSize: 7.5, cellPadding: 3, valign: 'middle', halign: 'center', lineColor: [210, 215, 230], lineWidth: 0.1, textColor: [40, 50, 70] },
        headStyles: { fillColor: [26, 34, 68], textColor: 255, fontStyle: 'bold', fontSize: 8 },
        columnStyles: { 0: { cellWidth: 26, fontStyle: 'bold', fillColor: [248, 250, 255] } },
        margin: { left: 10, right: 10, bottom: 10 },
      });

      doc.save(`Master_Timetable_${friendlyDay}.pdf`);
      toast(`Exported ${friendlyDay} timetable to PDF.`);
    } catch (e) {
      console.error(e); toast('Failed to export to PDF.', 'error');
    }
  });

  // ── EXPORT PNG (With Desktop-Forced Layout Fix) ──────────────────────
  document.getElementById('exportPngBtn').addEventListener('click', async () => {
    const grid = document.getElementById('gridContainer');
    if (!grid) return;
    const btn = document.getElementById('exportPngBtn');
    const oldText = btn.innerHTML;
    btn.disabled = true; btn.textContent = 'Processing...';

    try {
      const friendlyDay = currentDayType.charAt(0).toUpperCase() + currentDayType.slice(1);
      
      // 1. Create an off-screen massive container. 
      // This prevents the table from getting "squished" if the user has a small laptop screen.
      const printWrapper = document.createElement('div');
      printWrapper.style.position = 'absolute';
      printWrapper.style.left = '-9999px';
      printWrapper.style.top = '-9999px';
      printWrapper.style.width = '1200px'; 
      printWrapper.style.background = '#ffffff';
      printWrapper.style.padding = '40px';
      
      // 2. Inject Official Header
      printWrapper.innerHTML = `
        <div style="text-align:center; padding-bottom: 20px; border-bottom: 2px solid #e2e8f0; margin-bottom: 20px; position:relative;">
          ${window._ASES_LOGO_DATA ? `<img src="${window._ASES_LOGO_DATA}" style="position:absolute; left:0; top:0; height:65px;" />` : ''}
          <h2 style="margin:0; font-family:'Times New Roman', serif; font-size:26px; color:#1a2244;">B. K. Birla College, Kalyan</h2>
          <p style="margin:4px 0 0; font-family:'Times New Roman', serif; font-size:14px; color:#555;">(Empowered Autonomous Status)</p>
          <p style="margin:4px 0 0; font-family:'Times New Roman', serif; font-size:16px; font-weight:bold; font-style:italic;">Department of Management Studies</p>
          <h3 style="margin:16px 0 0; font-family:sans-serif; font-size:18px; color:#1a2244;">Master Timetable — ${friendlyDay}</h3>
        </div>
      `;
      
      // 3. Clone the active grid & strip restrictive width limitations
      const clone = grid.cloneNode(true);
      clone.style.minWidth = '100%';
      clone.style.border = '1px solid #e2e8f0';
      printWrapper.appendChild(clone);
      document.body.appendChild(printWrapper);

      // 4. Capture perfect high-res frame
      const canvas = await html2canvas(printWrapper, { scale: 3, useCORS: true, backgroundColor: '#ffffff' });

      // 5. Cleanup DOM & Download
      document.body.removeChild(printWrapper);
      const link = document.createElement('a');
      link.download = `Master_Timetable_${friendlyDay}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();

      toast(`Downloaded pristine ${friendlyDay} timetable snapshot.`);
    } catch (e) {
      console.error(e); toast('Failed to capture image snapshot.', 'error');
    } finally {
      btn.innerHTML = oldText; btn.disabled = false;
    }
  });

  // ── Modal ──────────────────────────────────────────────────────────
  async function openModal(timeSlotId, roomId, entryId) {
    modalTimeSlotId = timeSlotId; modalRoomId = roomId; existingEntry = null;

    const slot = timeSlots.find(s => s.id === timeSlotId);
    const room = rooms.find(r => r.id === roomId);
    modalRoomCode = room?.room_code ?? '';

    document.getElementById('modalTitle').textContent = entryId ? 'Edit Lecture' : 'Assign Lecture';
    document.getElementById('modalSub').textContent   = `${slot?.start_time?.slice(0,5)}–${slot?.end_time?.slice(0,5)} · Room ${room?.room_code}`;
    document.getElementById('clearCellBtn').style.display = entryId ? '' : 'none';
    document.getElementById('modalSave').disabled = true;
    document.getElementById('csfField').style.display = 'none';

    if (tsCourse) { tsCourse.destroy(); tsCourse = null; }
    if (tsCSF)    { tsCSF.destroy();    tsCSF    = null; }

    const cSelect = document.getElementById('modalCourse');
    cSelect.innerHTML = '<option value="">— select course —</option>' + courses.map(c => `<option value="${c.id}">${c.label}</option>`).join('');

    tsCourse = new TomSelect('#modalCourse', {
      placeholder: 'Search course…',
      onChange: async (val) => {
        document.getElementById('csfField').style.display  = 'none';
        document.getElementById('loadingCSF').style.display = 'flex';
        document.getElementById('modalSave').disabled = true;
        if (!val) { document.getElementById('loadingCSF').style.display = 'none'; return; }
        try {
          csfOptions = await getCSFForCourse(val);
          if (tsCSF) { tsCSF.destroy(); tsCSF = null; }
          const csfSel = document.getElementById('modalCSF');
          csfSel.innerHTML = '<option value="">— select subject / faculty —</option>' + csfOptions.map(o => `<option value="${o.csfId}">${o.label}</option>`).join('');
          tsCSF = new TomSelect('#modalCSF', { placeholder: 'Search subject / faculty…', onChange: (v) => { document.getElementById('modalSave').disabled = !v; }});
          document.getElementById('csfField').style.display   = ''; document.getElementById('loadingCSF').style.display = 'none';
        } catch(e) { toast(e.message, 'error'); document.getElementById('loadingCSF').style.display = 'none'; }
      }
    });

    if (entryId) {
      existingEntry = ttMap[timeSlotId]?.[roomId];
      if (existingEntry?.course_id) { tsCourse.setValue(existingEntry.course_id, true); }
    }
    document.getElementById('cellModal').classList.add('open');
  }

  function closeModal() { document.getElementById('cellModal').classList.remove('open'); modalTimeSlotId = modalRoomId = existingEntry = null; }
  document.getElementById('modalClose').addEventListener('click', closeModal); document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('cellModal').addEventListener('click', e => { if (e.target === document.getElementById('cellModal')) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Save / Clear ───────────────────────────────────────────────────
  document.getElementById('modalSave').addEventListener('click', async () => {
    const courseId = tsCourse?.getValue(); const csfId = tsCSF?.getValue();
    if (!courseId || !csfId) return;
    const opt = csfOptions.find(o => o.csfId === csfId); if (!opt) return;

    const btn = document.getElementById('modalSave'); btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Saving…';
    try {
      await upsertMasterEntry({ dayType: currentDayType, timeSlotId: modalTimeSlotId, roomId: modalRoomId, csfId, courseId, subjectId: opt.subjectId, facultyId: opt.facultyId });
      toast('Timetable cell saved.'); closeModal(); await loadGrid();
    } catch(e) { toast(e.message, 'error'); } 
    finally { btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="20,6 9,17 4,12"/></svg>Save'; }
  });

  document.getElementById('clearCellBtn').addEventListener('click', async () => {
    if (!existingEntry?.id) return;
    const btn = document.getElementById('clearCellBtn'); btn.disabled = true;
    try { await clearMasterEntry(existingEntry.id); toast('Cell cleared.', 'warn'); closeModal(); await loadGrid(); } 
    catch(e) { toast(e.message, 'error'); } finally { btn.disabled = false; }
  });

  loadGrid();
</script>
</body>
</html>
