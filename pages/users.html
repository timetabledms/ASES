<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASES — User Management</title>
  
  <!-- Shared Theme CSS -->
  <link rel="stylesheet" href="/css/theme.css" />
  
  <style>
    /* Page-specific overrides */
    .tabs { display:flex; gap:.5rem; margin-bottom:1.5rem; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:.35rem; transition: background .25s, border-color .25s; }
    .tab { flex:1; text-align:center; padding:.6rem 1rem; border-radius:9px; font-size:.88rem; font-weight:500; cursor:pointer; border:none; background:transparent; color:var(--text-muted); transition:background .2s, color .2s; }
    .tab.active { background:var(--accent); color:#fff; }
    
    .pw-wrap { position:relative; }
    .pw-wrap input { padding-right:2.5rem; }
    .pw-toggle { position:absolute; right:.8rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text-muted); display:flex; transition:color .15s; }
    .pw-toggle:hover { color:var(--text-primary); }
    .pw-toggle svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    
    .msg { display:none; align-items:center; gap:.6rem; border-radius:var(--radius); padding:.7rem .9rem; font-size:.85rem; margin-bottom:1rem; }
    .msg.visible { display:flex; }
    .msg svg { width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
    .msg.error { background:var(--error-bg); border:1px solid rgba(224,92,107,.2); color:var(--error); }
    .msg.success { background:rgba(62,207,142,.1); border:1px solid rgba(62,207,142,.2); color:var(--success); }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside class="sidebar">
  <div class="sidebar-college" id="sidebarCollege"></div>
  
  <nav id="sideNav"></nav>
  
  <div class="sidebar-footer">
    <div class="theme-row">
      <span class="theme-label">
        <span id="themeIcon"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
        <span id="themeLabel">Light mode</span>
      </span>
      <label class="toggle-switch"><input type="checkbox" id="themeToggle"/><span class="toggle-track"></span></label>
    </div>
    <div class="user-pill">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info"><div class="user-name" id="userName">…</div><div class="user-role" id="userRole">admin</div></div>
      <button class="btn-logout" id="logoutBtn" title="Sign out">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</aside>

<!-- ── Main ── -->
<main class="main">
  <div class="topbar">
    <div><h1 class="page-title">User Management</h1><p class="page-subtitle">Create and manage admin and faculty accounts</p></div>
  </div>
  <div class="content">
    
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="faculty">Faculty Accounts</button>
      <button class="tab" data-tab="admin">Admin Accounts</button>
    </div>

    <!-- ── Faculty Tab ── -->
    <div id="tabFaculty">
      <div class="card">
        <div class="card-title"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>Create Faculty Account</div>
        <div class="msg error" id="fErrMsg"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="fErrText"></span></div>
        <div class="msg success" id="fOkMsg"><svg viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg><span id="fOkText"></span></div>
        <div class="form-grid">
          <div class="field"><label>Full Name *</label><input type="text" id="fName" placeholder="Dr. Anita Sharma" /></div>
          <div class="field"><label>Email Address *</label><input type="email" id="fEmail" placeholder="faculty@college.edu" /></div>
          <div class="field"><label>Employee Code *</label><input type="text" id="fEmpCode" placeholder="EMP001" /></div>
          <div class="field"><label>Temporary Password *</label>
            <div class="pw-wrap"><input type="password" id="fPassword" placeholder="Min 8 characters" /><button class="pw-toggle" type="button" onclick="togglePw('fPassword',this)"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
            <div class="field-hint">Faculty will change this after first login.</div>
          </div>
          <div class="field"><label>Faculty Type *</label>
            <select id="fType">
              <option value="fulltime">Full-Time</option>
              <option value="visiting">Visiting</option>
            </select>
          </div>
          <div class="field"><label>Phone</label><input type="text" id="fPhone" placeholder="+91 9876543210" /></div>
          <div class="field"><label>Department</label><input type="text" id="fDept" placeholder="Commerce &amp; Management" /></div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:1.25rem">
          <button class="btn btn-primary" id="createFacultyBtn">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span class="spin" id="fSpin" style="display: none;"></span>Create Faculty Account
          </button>
        </div>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <div class="card-title" style="padding: 1.5rem 1.5rem 0;"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1"/><circle cx="3" cy="12" r="1"/><circle cx="3" cy="18" r="1"/></svg>All Faculty</div>
        <div class="table-wrap" style="border:none;border-radius:0;margin-top:1rem;">
          <table>
            <thead><tr><th>Name</th><th>Employee Code</th><th>Email</th><th>Type</th><th>Department</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="facultyTableBody"><tr class="empty-row"><td colspan="6"><span class="spin" style="display:inline-block"></span> Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ── Admin Tab ── -->
    <div id="tabAdmin" style="display:none">
      <div class="card">
        <div class="card-title"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Create Admin Account</div>
        <div class="msg error" id="aErrMsg"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span id="aErrText"></span></div>
        <div class="msg success" id="aOkMsg"><svg viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg><span id="aOkText"></span></div>
        <div class="form-grid">
          <div class="field"><label>Full Name *</label><input type="text" id="aName" placeholder="Admin Name" /></div>
          <div class="field"><label>Email Address *</label><input type="email" id="aEmail" placeholder="admin@college.edu" /></div>
          <div class="field"><label>Role *</label>
            <select id="aRole"><option value="admin">Admin</option><option value="super_admin">Super Admin</option></select>
          </div>
          <div class="field"><label>Temporary Password *</label>
            <div class="pw-wrap"><input type="password" id="aPassword" placeholder="Min 8 characters" /><button class="pw-toggle" type="button" onclick="togglePw('aPassword',this)"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:1.25rem">
          <button class="btn btn-primary" id="createAdminBtn">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span class="spin" id="aSpin" style="display: none;"></span>Create Admin Account
          </button>
        </div>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <div class="card-title" style="padding: 1.5rem 1.5rem 0;"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>All Admins</div>
        <div class="table-wrap" style="border:none;border-radius:0;margin-top:1rem;">
          <table>
            <thead><tr><th>Name</th><th>Role</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
            <tbody id="adminTableBody"><tr class="empty-row"><td colspan="5"><span class="spin" style="display:inline-block"></span> Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>
<div id="toast"></div>

<script>
function togglePw(inputId, btn) {
  const el = document.getElementById(inputId);
  el.type = el.type === 'password' ? 'text' : 'password';
}
</script>
<script type="module">
  import { requireRole } from '../js/auth/session.js';
  import { initSidebar } from '../js/components/sidebar.js';
  import { createAdmin, createFaculty, getAllAdmins, getAllFaculty, deactivateUser, reactivateUser } from '../js/modules/userManager.js';

  const session = await requireRole('admin');
  
  // Initialize shared sidebar component
  initSidebar(session, 'users');

  function toast(msg, type='success') {
    const c = document.getElementById('toast');
    const el = document.createElement('div');
    el.className = `toast-item ${type}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  // ── Tabs ─────────────────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tabFaculty').style.display = tab.dataset.tab === 'faculty' ? '' : 'none';
      document.getElementById('tabAdmin').style.display   = tab.dataset.tab === 'admin'   ? '' : 'none';
    });
  });

  // ── Faculty table ────────────────────────────────────────────────
  async function loadFaculty() {
    const tbody = document.getElementById('facultyTableBody');
    try {
      const rows = await getAllFaculty();
      if (!rows.length) { tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No faculty accounts yet.</td></tr>'; return; }
      tbody.innerHTML = rows.map(r => `<tr>
        <td><strong style="color:var(--text-primary)">${r.full_name}</strong></td>
        <td style="color:var(--text-muted)">${r.employee_code}</td>
        <td style="color:var(--text-muted)">${r.email ?? '—'}</td>
        <td><span class="badge" style="background:${r.faculty_type==='visiting'?'rgba(245,166,35,.12)':'rgba(62,207,142,.12)'};color:${r.faculty_type==='visiting'?'var(--warn)':'var(--success)'}">${r.faculty_type==='visiting'?'Visiting':'Full-Time'}</span></td><td style="color:var(--text-muted)">${r.department ?? '—'}</td>
        <td><span class="badge ${r.is_active ? 'badge-active' : 'badge-inactive'}">${r.is_active ? 'Active' : 'Inactive'}</span></td>
        <td>
          ${r.is_active
            ? `<button class="btn btn-warn btn-sm" onclick="toggleFaculty('${r.id}',false)">Deactivate</button>`
            : `<button class="btn btn-success btn-sm" onclick="toggleFaculty('${r.id}',true)">Reactivate</button>`}
        </td>
      </tr>`).join('');
    } catch(e) { toast(e.message, 'error'); }
  }

  window.toggleFaculty = async (id, active) => {
    try {
      active ? await reactivateUser('faculty', id) : await deactivateUser('faculty', id);
      toast(active ? 'Faculty reactivated.' : 'Faculty deactivated.', active ? 'success' : 'warn');
      loadFaculty();
    } catch(e) { toast(e.message, 'error'); }
  };

  // ── Admin table ──────────────────────────────────────────────────
  async function loadAdmins() {
    const tbody = document.getElementById('adminTableBody');
    try {
      const rows = await getAllAdmins();
      if (!rows.length) { tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No admin accounts yet.</td></tr>'; return; }
      tbody.innerHTML = rows.map(r => `<tr>
        <td><strong style="color:var(--text-primary)">${r.full_name ?? '—'}</strong></td>
        <td><span class="badge ${r.role === 'super_admin' ? 'badge-super' : 'badge-admin'}">${r.role}</span></td>
        <td><span class="badge ${r.is_active ? 'badge-active' : 'badge-inactive'}">${r.is_active ? 'Active' : 'Inactive'}</span></td>
        <td style="color:var(--text-muted);font-size:.8rem">${new Date(r.created_at).toLocaleDateString('en-IN')}</td>
        <td>
          ${r.id !== session.user.id
            ? (r.is_active
                ? `<button class="btn btn-warn btn-sm" onclick="toggleAdmin('${r.id}',false)">Deactivate</button>`
                : `<button class="btn btn-success btn-sm" onclick="toggleAdmin('${r.id}',true)">Reactivate</button>`)
            : `<span style="font-size:.78rem;color:var(--text-muted)">You</span>`}
        </td>
      </tr>`).join('');
    } catch(e) { toast(e.message, 'error'); }
  }

  window.toggleAdmin = async (id, active) => {
    try {
      active ? await reactivateUser('admin', id) : await deactivateUser('admin', id);
      toast(active ? 'Admin reactivated.' : 'Admin deactivated.', active ? 'success' : 'warn');
      loadAdmins();
    } catch(e) { toast(e.message, 'error'); }
  };

  // ── Create Faculty ───────────────────────────────────────────────
  document.getElementById('createFacultyBtn').addEventListener('click', async () => {
    document.getElementById('fErrMsg').classList.remove('visible');
    document.getElementById('fOkMsg').classList.remove('visible');
    const fullName = document.getElementById('fName').value.trim();
    const email    = document.getElementById('fEmail').value.trim();
    const empCode  = document.getElementById('fEmpCode').value.trim();
    const password = document.getElementById('fPassword').value;
    const phone    = document.getElementById('fPhone').value.trim();
    const dept     = document.getElementById('fDept').value.trim();
    const fType    = document.getElementById('fType').value;
    
    if (!fullName || !email || !empCode || !password) {
      document.getElementById('fErrText').textContent = 'Full name, email, employee code and password are required.';
      document.getElementById('fErrMsg').classList.add('visible'); return;
    }
    if (password.length < 8) {
      document.getElementById('fErrText').textContent = 'Password must be at least 8 characters.';
      document.getElementById('fErrMsg').classList.add('visible'); return;
    }
    
    const btn = document.getElementById('createFacultyBtn');
    btn.disabled = true; document.getElementById('fSpin').style.display = 'inline-block';
    
    try {
      await createFaculty({ fullName, email, password, employeeCode: empCode, phone, department: dept, facultyType: fType });
      document.getElementById('fOkText').textContent = `Faculty account created for ${fullName}.`;
      document.getElementById('fOkMsg').classList.add('visible');
      ['fName','fEmail','fEmpCode','fPassword','fPhone','fDept'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('fType').value = 'fulltime';
      toast(`Faculty account created for ${fullName}.`);
      loadFaculty();
    } catch(e) {
      document.getElementById('fErrText').textContent = e.message;
      document.getElementById('fErrMsg').classList.add('visible');
    } finally { btn.disabled = false; document.getElementById('fSpin').style.display = 'none'; }
  });

  // ── Create Admin ─────────────────────────────────────────────────
  document.getElementById('createAdminBtn').addEventListener('click', async () => {
    document.getElementById('aErrMsg').classList.remove('visible');
    document.getElementById('aOkMsg').classList.remove('visible');
    const fullName = document.getElementById('aName').value.trim();
    const email    = document.getElementById('aEmail').value.trim();
    const role     = document.getElementById('aRole').value;
    const password = document.getElementById('aPassword').value;
    
    if (!fullName || !email || !password) {
      document.getElementById('aErrText').textContent = 'All fields are required.';
      document.getElementById('aErrMsg').classList.add('visible'); return;
    }
    if (password.length < 8) {
      document.getElementById('aErrText').textContent = 'Password must be at least 8 characters.';
      document.getElementById('aErrMsg').classList.add('visible'); return;
    }
    
    const btn = document.getElementById('createAdminBtn');
    btn.disabled = true; document.getElementById('aSpin').style.display = 'inline-block';
    
    try {
      await createAdmin({ fullName, email, password, role });
      document.getElementById('aOkText').textContent = `Admin account created for ${fullName}.`;
      document.getElementById('aOkMsg').classList.add('visible');
      ['aName','aEmail','aPassword'].forEach(id => document.getElementById(id).value = '');
      toast(`Admin account created for ${fullName}.`);
      loadAdmins();
    } catch(e) {
      document.getElementById('aErrText').textContent = e.message;
      document.getElementById('aErrMsg').classList.add('visible');
    } finally { btn.disabled = false; document.getElementById('aSpin').style.display = 'none'; }
  });

  loadFaculty();
  loadAdmins();
</script>
</body>
</html>
