<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ASES — Execution Log</title>
  <link rel="stylesheet" href="/css/theme.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"/>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    .controls-bar{display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap;
      background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
      padding:1.1rem 1.35rem;margin-bottom:1.25rem;transition:background .25s,border-color .25s}
    .controls-group{display:flex;gap:1rem;align-items:flex-end;flex-wrap:wrap}

    .btn-export { display: flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); font-size: 0.85rem; cursor: pointer; transition: background 0.2s; font-weight: 500; height: 38px;}
    .btn-export:hover { background: var(--bg-hover); }
    .btn-export svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* Stat chips */
    .stat-chips{display:flex;gap:.65rem;flex-wrap:wrap;margin-bottom:1.1rem}
    .stat-chip{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;
      padding:.5rem .9rem;display:flex;align-items:center;gap:.5rem;font-size:.82rem;
      transition:background .25s,border-color .25s}
    .chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

    /* Legend */
    .legend{display:flex;gap:1.1rem;flex-wrap:wrap;margin-bottom:1rem;
      font-size:.75rem;color:var(--text-muted)}
    .leg-item{display:flex;align-items:center;gap:.35rem}
    .leg-sw{width:12px;height:12px;border-radius:3px;border:2px solid}

    /* Grid — same structure as master/daily */
    .tt-grid{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
      overflow:hidden;min-width:700px;transition:background .25s,border-color .25s}
    .tt-head{display:grid;border-bottom:1px solid var(--border);
      background:rgba(127,127,200,.04)}
    .th-cell{padding:.6rem .7rem;font-size:.66rem;font-weight:700;letter-spacing:.08em;
      text-transform:uppercase;color:var(--text-muted);border-right:1px solid var(--border)}
    .th-cell:last-child{border-right:none}
    .tt-row{display:grid;border-bottom:1px solid rgba(200,210,230,.4)}
    [data-theme="dark"] .tt-row{border-bottom-color:rgba(37,41,53,.5)}
    .tt-row:last-child{border-bottom:none}
    .tt-row.is-break{background:var(--bg-input)}
    .time-cell{padding:.45rem .65rem;font-size:.7rem;color:var(--text-muted);
      border-right:1px solid var(--border);display:flex;flex-direction:column;
      justify-content:center;min-width:86px;flex-shrink:0}
    .time-cell .tl{font-weight:700;font-size:.72rem;color:var(--text-label)}
    .time-cell .tr{font-size:.65rem;margin-top:.05rem}
    .break-span{padding:.38rem .7rem;font-size:.72rem;font-style:italic;
      color:var(--text-muted);display:flex;align-items:center;
      border-right:1px solid var(--border)}
    .break-span:last-child{border-right:none}

    /* Execution cell */
    .ec{padding:.42rem .5rem;border-right:1px solid var(--border);
      min-height:72px;position:relative;display:flex;flex-direction:column;
      gap:.1rem;transition:background .15s,border-left .15s}
    .ec:last-child{border-right:none}
    .ec.clickable{cursor:pointer}
    .ec.clickable:hover{filter:brightness(.94)}

    /* Status states — border-left colour */
    .ec.s-on-time    {background:rgba(62,207,142,.10);border-left:3px solid var(--success)}
    .ec.s-late       {background:rgba(245,166,35,.10); border-left:3px solid var(--warn)}
    .ec.s-not-engaged{background:rgba(224,92,107,.12); border-left:3px solid var(--error)}
    .ec.s-not-marked {background:transparent;          border-left:3px solid transparent}
    .ec.s-cancelled  {background:rgba(107,112,137,.07);border-left:3px solid var(--text-muted);opacity:.6;cursor:default}
    .ec.s-empty      {cursor:default}

    .ec-course  {font-size:.62rem;font-weight:700;letter-spacing:.05em;
      text-transform:uppercase;color:var(--text-muted)}
    .ec-subject {font-size:.77rem;font-weight:600;color:var(--text-primary);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ec-faculty {font-size:.7rem;color:var(--text-muted);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* Status pill shown inside cell */
    .status-pill{display:inline-block;font-size:.6rem;font-weight:700;
      padding:.06rem .38rem;border-radius:3px;margin-top:.12rem;width:fit-content}
    .sp-on-time    {background:rgba(62,207,142,.2);  color:var(--success)}
    .sp-late       {background:rgba(245,166,35,.2);  color:var(--warn)}
    .sp-not-engaged{background:rgba(224,92,107,.2);  color:var(--error)}
    .sp-not-marked {background:rgba(107,112,137,.15);color:var(--text-muted)}
    .sp-cancelled  {background:rgba(107,112,137,.15);color:var(--text-muted)}

    /* Hint tooltip on hover */
    .click-hint{position:absolute;bottom:.28rem;right:.42rem;font-size:.58rem;
      color:var(--text-muted);opacity:0;transition:opacity .15s;pointer-events:none}
    .ec.clickable:hover .click-hint{opacity:.6}

    /* Placeholder */
    .grid-placeholder{padding:3.5rem;text-align:center;color:var(--text-muted);
      display:flex;flex-direction:column;align-items:center;gap:.75rem}
    .grid-placeholder svg{width:36px;height:36px;stroke:var(--border);fill:none;
      stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}

    @media(max-width:768px){.sidebar{display:none}.content{padding:1rem}.topbar{padding:1rem}.controls-bar{flex-direction:column;align-items:stretch}}
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-college" id="sidebarCollege"></div>
  <nav id="sideNav"></nav>
  <div class="sidebar-footer">
    <div class="theme-row">
      <span class="theme-label">
        <span id="themeIcon"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
        <span id="themeLabel">Light mode</span>
      </span>
      <label class="toggle-switch"><input type="checkbox" id="themeToggle"/><span class="toggle-track"></span></label>
    </div>
    <div class="user-pill">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">…</div>
        <div class="user-role" id="userRole">admin</div>
      </div>
      <button class="btn-logout" id="logoutBtn">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div>
      <h1 class="page-title">Execution Log</h1>
      <p class="page-subtitle">Click any lecture cell to cycle through status — changes save instantly</p>
    </div>
  </div>
  <div class="content">

    <div class="controls-bar">
      <div class="controls-group">
        <div class="field">
          <label>Date</label>
          <input type="text" id="execDatePicker" style="width:160px" readonly/>
        </div>
        <button class="btn btn-primary" id="loadDayBtn" style="height:38px;">
          <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Load Day
        </button>
      </div>
      
      <div class="controls-group" style="gap: 0.75rem;">
        <button class="btn-export" id="exportExcelBtn">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> Excel
        </button>
        <button class="btn-export" id="exportPdfBtn">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15h2v4H9z"/><path d="M13 15h3v4"/><path d="M13 17h2"/></svg> PDF
        </button>
      </div>
    </div>

    <div class="stat-chips" id="statChips" style="display:none">
      <div class="stat-chip"><span class="chip-dot" style="background:var(--success)"></span><strong id="cntOnTime">0</strong>&nbsp;On Time</div>
      <div class="stat-chip"><span class="chip-dot" style="background:var(--warn)"></span><strong id="cntLate">0</strong>&nbsp;Late</div>
      <div class="stat-chip"><span class="chip-dot" style="background:var(--error)"></span><strong id="cntNotEngaged">0</strong>&nbsp;Not Engaged</div>
      <div class="stat-chip"><span class="chip-dot" style="background:var(--text-muted)"></span><strong id="cntNotMarked">0</strong>&nbsp;Not Marked</div>
      <div class="stat-chip"><span class="chip-dot" style="background:var(--text-muted);opacity:.4"></span><strong id="cntCancelled">0</strong>&nbsp;Cancelled</div>
    </div>

    <div class="legend" id="legendRow" style="display:none">
      <span style="font-size:.75rem;color:var(--text-muted);font-weight:600;margin-right:.25rem">Click to cycle:</span>
      <div class="leg-item"><div class="leg-sw" style="background:rgba(62,207,142,.1);border-color:var(--success)"></div>On Time</div>
      <div class="leg-item"><div class="leg-sw" style="background:rgba(245,166,35,.1);border-color:var(--warn)"></div>Late</div>
      <div class="leg-item"><div class="leg-sw" style="background:rgba(224,92,107,.12);border-color:var(--error)"></div>Not Engaged</div>
      <div class="leg-item"><div class="leg-sw" style="background:transparent;border-color:var(--border)"></div>Not Marked</div>
      <div class="leg-item"><div class="leg-sw" style="background:rgba(107,112,137,.07);border-color:var(--text-muted)"></div>Cancelled (not clickable)</div>
    </div>

    <div style="overflow-x:auto">
      <div id="gridContainer">
        <div class="tt-grid">
          <div class="grid-placeholder">
            <svg viewBox="0 0 24 24"><polyline points="9,11 12,14 22,4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            <div>Select a date and click <strong>Load Day</strong></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</main>

<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script type="module">
import { requireRole } from '/js/auth/session.js';
import { initSidebar } from '/js/components/sidebar.js';
import { supabase } from '/js/config/supabase.js';
import { preloadLogoForPDF } from '/js/utils/exportHelpers.js';

const session = await requireRole('admin');
initSidebar(session, 'execution');
preloadLogoForPDF();
const generatedBy = session?.profile?.full_name ?? 'Admin';

// ── Toast ──────────────────────────────────────────────────────────
function toast(msg, type='success') {
  const c=document.getElementById('toast');
  const el=document.createElement('div');
  el.className=`toast-item ${type}`;el.textContent=msg;
  c.appendChild(el);setTimeout(()=>el.remove(),3500);
}

// ── State ──────────────────────────────────────────────────────────
function localDateStr(d) {
  const dt = d ?? new Date();
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
let currentDate = localDateStr();
let timeSlots   = [];
let rooms       = [];
let scheduleMap = {};   
let execMap     = {};   

const STATUS_CYCLE = ['on_time','late','not_engaged','not_marked'];
const STATUS_LABEL = {on_time:'On Time',late:'Late',not_engaged:'Not Engaged',not_marked:'Not Marked'};
const STATUS_CLASS = {on_time:'s-on-time',late:'s-late',not_engaged:'s-not-engaged',not_marked:'s-not-marked'};
const PILL_CLASS   = {on_time:'sp-on-time',late:'sp-late',not_engaged:'sp-not-engaged',not_marked:'sp-not-marked'};

// ── Flatpickr ──────────────────────────────────────────────────────
flatpickr('#execDatePicker', {
  dateFormat: 'Y-m-d',
  defaultDate: new Date(),
  disableMobile: true,
  onChange([d]) {
    if (!d) return;
    currentDate = localDateStr(d);
    loadDay(currentDate);
  }
});

// ── Load day button ────────────────────────────────────────────────
document.getElementById('loadDayBtn').addEventListener('click', () => {
  loadDay(currentDate);
});

// ── Load day ───────────────────────────────────────────────────────
async function loadDay(date) {
  const loadDate = date ?? currentDate;

  const btn = document.getElementById('loadDayBtn');
  btn.disabled = true;
  gridLoading();

  try {
    const DAY_MAP_E=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    const dayType = DAY_MAP_E[new Date(loadDate+'T00:00:00').getDay()];
    const slotDt  = dayType==='saturday'?'saturday':'weekday';
    
    if(dayType==='sunday'){gridEmpty('No schedule on Sundays.');document.getElementById('statChips').style.display='none';document.getElementById('legendRow').style.display='none';return;}
    
    const{data:holChk}=await supabase.from('holidays').select('name').eq('holiday_date',loadDate).maybeSingle();
    if(holChk){gridEmpty(`🎉 Holiday: ${holChk.name}. No execution log for this day.`);document.getElementById('statChips').style.display='none';document.getElementById('legendRow').style.display='none';return;}

    // QUERY UPDATED: Now fetches original_faculty_id and the nested csf replacement subject
    const [slotsRes, roomsRes, schedRes, execRes] = await Promise.all([
      supabase.from('time_slots')
        .select('id,slot_label,start_time,end_time,slot_type,sort_order')
        .eq('day_type', slotDt).order('sort_order'),
      supabase.from('rooms')
        .select('id,room_code').eq('is_active',true).order('room_code'),
      supabase.from('daily_schedule')
        .select(`
          id, is_cancelled, cancel_reason, is_rescheduled,
          time_slot_id, room_id, course_id, subject_id, assigned_faculty_id, original_faculty_id,
          time_slot:time_slots!time_slot_id(id,slot_label,start_time,end_time,slot_type,sort_order),
          room:rooms!room_id(id,room_code),
          course:courses!course_id(id,year,program,division),
          subject:subjects!subject_id(id,subject_name),
          assigned_faculty:faculty!assigned_faculty_id(id,full_name),
          original_faculty:faculty!original_faculty_id(id,full_name),
          csf:course_subject_faculty!csf_id(subject:subjects!subject_id(subject_name))
        `)
        .eq('schedule_date', loadDate),
      supabase.from('lecture_execution')
        .select('daily_schedule_id,faculty_status')
        .eq('schedule_date', loadDate),
    ]);

    if (slotsRes.error) throw new Error('Time slots: ' + slotsRes.error.message);
    if (roomsRes.error) throw new Error('Rooms: ' + roomsRes.error.message);
    if (schedRes.error) throw new Error('Schedule: ' + schedRes.error.message);

    timeSlots = slotsRes.data ?? [];
    rooms     = roomsRes.data ?? [];

    scheduleMap = {};
    for (const row of (schedRes.data ?? [])) {
      const t=row.time_slot_id, r=row.room_id;
      if (!scheduleMap[t]) scheduleMap[t]={};
      scheduleMap[t][r] = row;
    }

    execMap = {};
    for (const ex of (execRes.data ?? [])) {
      execMap[ex.daily_schedule_id] = ex;
    }

    if (!schedRes.data?.length) {
      gridEmpty('No schedule found for this date. Generate it in Daily Scheduler first.');
      document.getElementById('statChips').style.display='none';
      document.getElementById('legendRow').style.display='none';
      return;
    }

    renderGrid();
    updateStats();
    document.getElementById('statChips').style.display='';
    document.getElementById('legendRow').style.display='';

  } catch(e) {
    toast(e.message, 'error');
    gridEmpty('Failed to load: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

// ── Render grid ────────────────────────────────────────────────────
function renderGrid() {
  if (!timeSlots.length || !rooms.length) { gridEmpty('No data.'); return; }
  const cols = `grid-template-columns:86px repeat(${rooms.length},minmax(108px,1fr))`;
  let h = `<div class="tt-grid">`;

  h += `<div class="tt-head" style="${cols}">
    <div class="th-cell">Time</div>
    ${rooms.map(r=>`<div class="th-cell">Room ${r.room_code}</div>`).join('')}
  </div>`;

  for (const slot of timeSlots) {
    const isBreak = slot.slot_type !== 'lecture';
    h += `<div class="tt-row${isBreak?' is-break':''}" style="${cols}">`;
    h += `<div class="time-cell">
      <span class="tl">${slot.slot_label??''}</span>
      <span class="tr">${slot.start_time.slice(0,5)}–${slot.end_time.slice(0,5)}</span>
    </div>`;

    if (isBreak) {
      const lbl = slot.slot_type==='lunch'?'🍽 Lunch':'☕ Recess';
      h += `<div class="break-span" style="grid-column:2/${rooms.length+2}">${lbl}</div>`;
    } else {
      for (const room of rooms) {
        const row = scheduleMap[slot.id]?.[room.id];
        h += renderCell(row);
      }
    }
    h += `</div>`;
  }

  h += `</div>`;
  document.getElementById('gridContainer').innerHTML = h;

  document.querySelectorAll('.ec.clickable').forEach(cell => {
    cell.addEventListener('click', () => cycleStatus(cell));
  });
}

// ── Render a single cell ───────────────────────────────────────────
function renderCell(row) {
  if (!row) return `<div class="ec s-empty"></div>`;

  // UI LOGIC: Determine if this is a replaced lecture to show the new reality
  const isReplaced = row.is_rescheduled && row.original_faculty_id && row.original_faculty_id !== row.assigned_faculty_id;
  const displaySubject = isReplaced ? (row.csf?.subject?.subject_name ?? '—') : (row.subject?.subject_name ?? '—');
  const displayFaculty = row.assigned_faculty?.full_name ?? '—';

  if (row.is_cancelled) {
    return `<div class="ec s-cancelled">
      <div class="ec-course">${cName(row.course)}</div>
      <div class="ec-subject">${displaySubject}</div>
      <div class="ec-faculty">Prof. ${displayFaculty}</div>
      <span class="status-pill sp-cancelled">CANCELLED</span>
    </div>`;
  }

  const ex     = execMap[row.id];
  const status = ex?.faculty_status ?? 'not_marked';
  const sc     = STATUS_CLASS[status] ?? 's-not-marked';
  const pc     = PILL_CLASS[status]   ?? 'sp-not-marked';
  const lbl    = STATUS_LABEL[status] ?? 'Not Marked';

  // Include a small visual tag if it's a replacement lecture
  const replacementTag = isReplaced ? `<span style="font-size:0.55rem;color:var(--accent);font-weight:700">(SUB)</span>` : '';

  return `<div class="ec ${sc} clickable" data-id="${row.id}" data-status="${status}">
    <div class="ec-course">${cName(row.course)}</div>
    <div class="ec-subject">${displaySubject}</div>
    <div class="ec-faculty">Prof. ${displayFaculty} ${replacementTag}</div>
    <span class="status-pill ${pc}">${lbl}</span>
    <span class="click-hint">click to update</span>
  </div>`;
}

function cName(c) {
  if (!c) return '';
  return c.division?`${c.year} ${c.program} ${c.division}`:`${c.year} ${c.program}`;
}

// ── Cycle status on click ──────────────────────────────────────────
async function cycleStatus(cell) {
  const scheduleId = cell.dataset.id;
  const current    = cell.dataset.status ?? 'not_marked';
  const idx        = STATUS_CYCLE.indexOf(current);
  const nextStatus = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];

  updateCellUI(cell, nextStatus);

  try {
    const { error } = await supabase
      .from('lecture_execution')
      .upsert({
        daily_schedule_id:  scheduleId,
        schedule_date:      currentDate,
        actual_faculty_id:  getScheduleRow(scheduleId)?.assigned_faculty?.id ?? null,
        faculty_status:     nextStatus,
        is_time_changed:    false,
        is_room_changed:    false,
        is_replaced:        false,
        marked_by:          session.user.id,
        updated_at:         new Date().toISOString(),
      }, { onConflict: 'daily_schedule_id' });

    if (error) throw error;

    if (!execMap[scheduleId]) execMap[scheduleId] = { daily_schedule_id: scheduleId };
    execMap[scheduleId].faculty_status = nextStatus;

    updateStats();
  } catch(e) {
    updateCellUI(cell, current);
    toast('Failed to save: ' + e.message, 'error');
  }
}

function updateCellUI(cell, status) {
  ['s-on-time','s-late','s-not-engaged','s-not-marked'].forEach(c => cell.classList.remove(c));
  cell.classList.add(STATUS_CLASS[status] ?? 's-not-marked');
  cell.dataset.status = status;

  const pill = cell.querySelector('.status-pill');
  if (pill) {
    ['sp-on-time','sp-late','sp-not-engaged','sp-not-marked'].forEach(c => pill.classList.remove(c));
    pill.classList.add(PILL_CLASS[status] ?? 'sp-not-marked');
    pill.textContent = STATUS_LABEL[status] ?? 'Not Marked';
  }
}

function getScheduleRow(scheduleId) {
  for (const tsMap of Object.values(scheduleMap)) {
    for (const row of Object.values(tsMap)) {
      if (row.id === scheduleId) return row;
    }
  }
  return null;
}

// ── Update stat chips ──────────────────────────────────────────────
function updateStats() {
  let onTime=0, late=0, notEngaged=0, notMarked=0, cancelled=0;

  for (const tsMap of Object.values(scheduleMap)) {
    for (const row of Object.values(tsMap)) {
      if (row.time_slot?.slot_type !== 'lecture') continue;
      if (row.is_cancelled) { cancelled++; continue; }
      const status = execMap[row.id]?.faculty_status ?? 'not_marked';
      if (status==='on_time')      onTime++;
      else if (status==='late')    late++;
      else if (status==='not_engaged') notEngaged++;
      else notMarked++;
    }
  }

  document.getElementById('cntOnTime').textContent    = onTime;
  document.getElementById('cntLate').textContent      = late;
  document.getElementById('cntNotEngaged').textContent= notEngaged;
  document.getElementById('cntNotMarked').textContent = notMarked;
  document.getElementById('cntCancelled').textContent = cancelled;
}

// ── A0 PDF Export Logic ──────────────────────────────────────────────────────
document.getElementById('exportPdfBtn').addEventListener('click', () => {
  if (!timeSlots.length || !rooms.length || Object.keys(scheduleMap).length === 0) return toast('No data to export', 'warn');
  if(!window.jspdf){alert('PDF library not loaded.');return;}
  
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'pt', format: 'a0' });
  const pageW = doc.internal.pageSize.width;
  const pageH = doc.internal.pageSize.height;
  
  const dtStr = new Date(currentDate).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

  // Build Head
  const head = [['Time', ...rooms.map(r => `Room ${r.room_code}`)]];
  
  // Build Body
  const body = [];
  timeSlots.forEach(slot => {
    const timeLabel = slot.slot_type === 'lecture'
        ? `${slot.slot_label || ''}\n\n${slot.start_time.slice(0,5)} - ${slot.end_time.slice(0,5)}`
        : `${slot.slot_label || ''}\n${slot.start_time.slice(0,5)} - ${slot.end_time.slice(0,5)}`;

    if (slot.slot_type !== 'lecture') {
      const lbl = slot.slot_type === 'lunch' ? 'Lunch Break' : 'Recess';
      body.push([
        { content: timeLabel, styles: { fontStyle: 'bold', valign: 'middle', halign: 'center', fillColor: [240, 240, 245] } },
        { content: lbl, colSpan: rooms.length, styles: { halign: 'center', valign: 'middle', fontStyle: 'italic', textColor: [140, 140, 140] } }
      ]);
    } else {
      const rowData = [{ content: timeLabel, styles: { fontStyle: 'bold', valign: 'middle', halign: 'center', fillColor: [240, 240, 245] } }];
      
      rooms.forEach(room => {
        const row = scheduleMap[slot.id]?.[room.id];
        if (!row) {
          rowData.push('');
          return;
        }
        
        const isReplaced = row.is_rescheduled && row.original_faculty_id && row.original_faculty_id !== row.assigned_faculty_id;
        const ex = execMap[row.id];
        const s = row.is_cancelled ? 'cancelled' : (ex?.faculty_status ?? 'not_marked');
        const cname = row.course ? (row.course.division ? `${row.course.year} ${row.course.program} ${row.course.division}` : `${row.course.year} ${row.course.program}`) : '';
        
        // Export logic: Print reality
        const sub = isReplaced ? (row.csf?.subject?.subject_name ?? '—') : (row.subject?.subject_name ?? '—');
        const fac = row.assigned_faculty?.full_name ?? '—';
        
        const STATUS_LBL = {on_time:'On Time', late:'Late', not_engaged:'Not Engaged', not_marked:'Not Marked', cancelled:'CANCELLED'};
        const lbl = row.is_cancelled ? 'CANCELLED' : (STATUS_LBL[s] ?? 'Not Marked');
        
        rowData.push(`${cname}\n${sub}\nProf. ${fac}\n[${lbl}]`);
      });
      body.push(rowData);
    }
  });

  const statusFill = {
    on_time: [212, 247, 231], late: [255, 243, 205],
    not_engaged: [253, 232, 234], not_marked: [240, 240, 240], cancelled: [230, 230, 230]
  };

  doc.autoTable({
    head, body,
    startY: 330,
    theme: 'grid',
    styles: { fontSize: 14, cellPadding: 16, valign: 'middle', halign: 'center', overflow: 'linebreak', lineColor: [180, 180, 180], lineWidth: 1 },
    headStyles: { fillColor: [26, 34, 68], textColor: 255, fontStyle: 'bold', fontSize: 16, halign: 'center' },
    columnStyles: { 0: { cellWidth: 160, fontStyle: 'bold' } },
    margin: { top: 330, left: 80, right: 80, bottom: 80 },
    tableWidth: 'auto',
    didParseCell(data) {
      if (data.section === 'body' && data.column.index > 0 && data.cell.raw) {
        const text = String(data.cell.raw.content || data.cell.raw);
        if (!text || text === '') return;
        
        let fill = [255, 255, 255];
        if (text.includes('[On Time]')) fill = statusFill.on_time;
        else if (text.includes('[Late]')) fill = statusFill.late;
        else if (text.includes('[Not Engaged]')) fill = statusFill.not_engaged;
        else if (text.includes('[Not Marked]')) fill = statusFill.not_marked;
        else if (text.includes('[CANCELLED]')) fill = statusFill.cancelled;

        if (!text.includes('Lunch Break') && !text.includes('Recess') && text !== '-') {
           data.cell.styles.fillColor = fill;
        }
      }
    },
    didDrawPage(data) {
      if(window._ASES_LOGO_DATA){
        try { doc.addImage(window._ASES_LOGO_DATA, 'PNG', 80, 70, 180, 180); } catch(e){}
      }
      const cx = pageW / 2;
      
      doc.setFont('times', 'bold'); doc.setFontSize(46); doc.setTextColor(26, 34, 68);
      doc.text('B. K. Birla College, Kalyan', cx, 100, { align: 'center' });
      
      doc.setFont('times', 'normal'); doc.setFontSize(26); doc.setTextColor(50, 60, 90);
      doc.text('(Empowered Autonomous Status)', cx, 140, { align: 'center' });
      
      doc.setFont('times', 'bolditalic'); doc.setFontSize(30);
      doc.text('Department of Management Studies', cx, 185, { align: 'center' });
      
      doc.setFont('helvetica', 'bold'); doc.setFontSize(34); doc.setTextColor(26, 34, 68);
      doc.text('Daily Execution Report', cx, 250, { align: 'center' });
      
      doc.setFont('helvetica', 'normal'); doc.setFontSize(22); doc.setTextColor(90, 100, 120);
      doc.text(`Date: ${dtStr}`, cx, 290, { align: 'center' });
      
      // Footer
      doc.setFont('helvetica', 'normal'); doc.setFontSize(16); doc.setTextColor(120);
      doc.text(`Report Generated By: ${generatedBy}`, 80, pageH - 40);
      doc.text(`Report Generated On: ${new Date().toLocaleString('en-IN')}`, 80, pageH - 20);
      doc.text(`Page ${data.pageNumber}`, pageW / 2, pageH - 20, { align: 'center' });
    }
  });

  doc.save(`Execution_Log_${currentDate}.pdf`);
});

// ── Excel Export Logic ───────────────────────────────────────────────────────
document.getElementById('exportExcelBtn').addEventListener('click', () => {
  if (!timeSlots.length || !rooms.length || Object.keys(scheduleMap).length === 0) return toast('No data to export', 'warn');
  
  const wsData = [];
  const merges = [];

  const headRow = ["Time"];
  rooms.forEach(r => headRow.push(`Room ${r.room_code}`));
  wsData.push(headRow);

  let rowIndex = 1;

  timeSlots.forEach(slot => {
     const timeLabel = slot.slot_type === 'lecture'
          ? `${slot.slot_label || ''}\n\n${slot.start_time.slice(0,5)} - ${slot.end_time.slice(0,5)}`
          : `${slot.slot_label || ''}\n${slot.start_time.slice(0,5)} - ${slot.end_time.slice(0,5)}`;

     if (slot.slot_type !== 'lecture') {
        const lbl = slot.slot_type === 'lunch' ? 'Lunch Break' : 'Recess';
        const row = [timeLabel, lbl];
        for (let i = 1; i < rooms.length; i++) row.push("");
        wsData.push(row);
        merges.push({ s: { r: rowIndex, c: 1 }, e: { r: rowIndex, c: rooms.length } });
        rowIndex += 1;
     } else {
        const row1 = [timeLabel]; 
        const row2 = [""];        
        const row3 = [""];        
        const row4 = [""];        

        rooms.forEach(room => {
           const row = scheduleMap[slot.id]?.[room.id];
           if (row) {
              const isReplaced = row.is_rescheduled && row.original_faculty_id && row.original_faculty_id !== row.assigned_faculty_id;
              const ex = execMap[row.id];
              const s = row.is_cancelled ? 'cancelled' : (ex?.faculty_status ?? 'not_marked');
              const STATUS_LBL = {on_time:'On Time', late:'Late', not_engaged:'Not Engaged', not_marked:'Not Marked', cancelled:'CANCELLED'};
              
              const c = row.course ? (row.course.division ? `${row.course.year} ${row.course.program} ${row.course.division}` : `${row.course.year} ${row.course.program}`) : '-';
              
              const sub = isReplaced ? (row.csf?.subject?.subject_name ?? '-') : (row.subject?.subject_name ?? '-');
              const f = row.assigned_faculty?.full_name || '-';
              
              let statusStr = `[${STATUS_LBL[s] ?? 'Not Marked'}]`;
              
              row1.push(c);
              row2.push(sub);
              row3.push(`Prof. ${f}`);
              row4.push(statusStr);
           } else {
              row1.push("-");
              row2.push("");
              row3.push("");
              row4.push("");
           }
        });
        
        wsData.push(row1, row2, row3, row4);
        merges.push({ s: { r: rowIndex, c: 0 }, e: { r: rowIndex + 3, c: 0 } });
        rowIndex += 4;
     }
  });

  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!merges'] = merges;
  const cols = [{ wch: 18 }]; 
  rooms.forEach(() => cols.push({ wch: 30 })); 
  ws['!cols'] = cols;

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Execution");
  XLSX.writeFile(wb, `Execution_Log_${currentDate}.xlsx`);
});
