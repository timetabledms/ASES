<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ASES — Weekly Timetable View</title>
  
  <link rel="stylesheet" href="/css/theme.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css"/>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    /* Prevent Tom Select from wrapping text to the next line */
    .ts-wrapper.single .ts-control { display: flex !important; flex-wrap: nowrap !important; align-items: center; overflow: hidden !important; }
    .ts-wrapper.single .ts-control .item { white-space: nowrap !important; overflow: hidden !important; text-overflow: ellipsis !important; max-width: 95% !important; pointer-events: none; }
    .ts-wrapper.single .ts-control input { min-width: 0 !important; }

    .controls-bar { display:flex; align-items:flex-end; justify-content:space-between; gap:1rem; flex-wrap:wrap; background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:1.1rem 1.35rem; margin-bottom:1.25rem; transition:background .25s,border-color .25s; }
    .controls-group { display:flex; gap:1rem; align-items:flex-end; flex-wrap:wrap; }
    .btn-export { display: flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); font-size: 0.85rem; cursor: pointer; transition: background 0.2s; font-weight: 500; height: 38px;}
    .btn-export:hover { background: var(--bg-hover); }
    .btn-export svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* Custom Grid for Weekly View */
    .weekly-grid-wrap { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; overflow:hidden; min-width:900px; margin-bottom: 2rem; }
    .wg-header { display:grid; grid-template-columns: 100px repeat(6, minmax(130px, 1fr)); border-bottom:1px solid var(--border); background:rgba(127,127,200,.05); }
    .wg-th { padding:0.75rem; font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); border-right:1px solid var(--border); text-align: center; }
    .wg-th:last-child { border-right:none; }
    
    .wg-row { display:grid; grid-template-columns: 100px repeat(6, minmax(130px, 1fr)); border-bottom:1px solid rgba(200,210,230,.4); }
    .wg-row:last-child { border-bottom:none; }
    .wg-row.is-break { background: var(--bg-input); }
    
    .wg-time { padding:0.5rem; border-right:1px solid var(--border); display:flex; flex-direction:column; justify-content:center; align-items: center; text-align: center; }
    .wg-time .tl { font-weight:700; font-size:0.75rem; color:var(--text-label); }
    .wg-time .tr { font-size:0.65rem; color:var(--text-muted); margin-top:0.15rem; }
    
    .wg-cell { padding:0.6rem; border-right:1px solid var(--border); min-height: 80px; display:flex; flex-direction:column; justify-content:center; align-items: center; text-align: center; gap: 0.2rem; transition: background 0.2s; }
    .wg-cell:last-child { border-right:none; }
    .wg-cell.filled { background: rgba(79,106,245,.04); }
    .wg-cell.filled:hover { background: rgba(79,106,245,.08); }
    
    .wg-line1 { font-size: 0.68rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
    .wg-line2 { font-size: 0.8rem; font-weight: 600; color: var(--text-primary); line-height: 1.2; }
    .wg-line3 { font-size: 0.7rem; color: var(--accent); font-weight: 500; }
    
    .break-label { grid-column: 2 / 8; display:flex; align-items:center; justify-content:center; padding:0.5rem; font-size:0.8rem; font-style:italic; color:var(--text-muted); font-weight:500; }

    .grid-placeholder { padding:4rem; text-align:center; color:var(--text-muted); display:flex; flex-direction:column; align-items:center; gap:1rem; }
    .grid-placeholder svg { width:40px; height:40px; stroke:var(--border); fill:none; stroke-width:1.5; }
    
    /* Virtual Section */
    .virtual-section { background: var(--bg-card); border-radius: 12px; border: 1px dashed var(--accent); padding: 1.5rem; margin-bottom: 2rem; display: none;}
    .virtual-header { display: flex; align-items: center; gap: 0.5rem; color: var(--accent); font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; }
    .v-grid { display: flex; flex-wrap: wrap; gap: 1rem; }
    .v-card { padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid rgba(79,106,245,.2); background: rgba(79,106,245,.04); min-width: 200px; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-college" id="sidebarCollege"></div>
  <nav id="sideNav"></nav>
  <div class="sidebar-footer">
    <div class="theme-row">
      <span class="theme-label"><span id="themeIcon"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span><span id="themeLabel">Light mode</span></span>
      <label class="toggle-switch"><input type="checkbox" id="themeToggle"/><span class="toggle-track"></span></label>
    </div>
    <div class="user-pill">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info"><div class="user-name" id="userName">…</div><div class="user-role" id="userRole">admin</div></div>
      <button class="btn-logout" id="logoutBtn"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div>
        <h1 class="page-title">Weekly Timetable View</h1>
        <p class="page-subtitle">View, print, and export a full week's schedule for any Course, Faculty, or Room</p>
    </div>
  </div>
  
  <div class="content">
    
    <div class="controls-bar">
      <div class="controls-group" style="flex: 1; max-width: 600px;">
        <div class="field" style="width: 150px;">
          <label>Filter By</label>
          <select id="filterType" class="form-control">
            <option value="course">Course</option>
            <option value="faculty">Faculty</option>
            <option value="room">Room</option>
          </select>
        </div>
        <div class="field" style="flex: 1; min-width: 250px;">
          <label id="entityLabel">Select Course</label>
          <select id="entitySelect" placeholder="Search..."></select>
        </div>
        <button class="btn btn-primary" id="viewBtn" style="height: 38px;">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;margin-right:6px;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> View
        </button>
      </div>

      <div class="controls-group" style="gap: 0.75rem;" id="exportGroup">
        <button class="btn-export" id="exportExcelBtn" disabled>
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> Excel
        </button>
        <button class="btn-export" id="exportPdfBtn" disabled>
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15h2v4H9z"/><path d="M13 15h3v4"/><path d="M13 17h2"/></svg> PDF
        </button>
      </div>
    </div>

    <div style="overflow-x:auto;">
      <div id="gridContainer">
        <div class="weekly-grid-wrap">
          <div class="grid-placeholder">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <div>Select a filter and click <strong>View</strong> to generate the weekly timetable.</div>
          </div>
        </div>
      </div>
    </div>

    <div class="virtual-section" id="virtualSection">
        <div class="virtual-header">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            Virtual / Flexible Load
        </div>
        <div id="virtualGrid" class="v-grid"></div>
    </div>

  </div>
</main>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
<script type="module">
  import { requireRole } from '/js/auth/session.js';
  import { initSidebar } from '/js/components/sidebar.js';
  import { supabase } from '/js/config/supabase.js';
  import { preloadLogoForPDF } from '/js/utils/exportHelpers.js';

  const session = await requireRole('admin');
  initSidebar(session, 'timetable'); // Keep them in the timetable section
  preloadLogoForPDF();
  const generatedBy = session?.profile?.full_name ?? 'Admin';

  function toast(msg, type='success') {
    const c=document.getElementById('toast');
    const el=document.createElement('div');
    el.className=`toast-item ${type}`; el.textContent=msg;
    c.appendChild(el); setTimeout(()=>el.remove(),4000);
  }

  // --- STATE ---
  let courses = [], faculties = [], rooms = [];
  let timeSlots = [];
  let masterData = []; // Holds ALL active master timetable rows
  let tsSelect = null;
  const daysOfWeek = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
  let currentViewData = null; // Stored for exports
  let currentVirtualData = null;

  // --- INITIALIZATION ---
  async function loadBaseData() {
      try {
          const [crsRes, facRes, rmRes, tsRes, masterRes] = await Promise.all([
              supabase.from('courses').select('id, year, program, division').eq('is_active', true),
              supabase.from('faculty').select('id, full_name').eq('is_active', true).order('full_name'),
              supabase.from('rooms').select('id, room_code').eq('is_active', true).order('room_code'),
              supabase.from('time_slots').select('*').order('sort_order'),
              supabase.from('master_timetable').select(`
                  id, day_type, time_slot_id, room_id, course_id, subject_id, faculty_id, virtual_start_time, virtual_end_time,
                  course:courses(id, year, program, division),
                  subject:subjects(id, subject_name),
                  faculty:faculty(id, full_name),
                  room:rooms(id, room_code)
              `).eq('is_active', true)
          ]);

          courses = (crsRes.data || []).map(c => ({ id: c.id, label: c.division ? `${c.year} ${c.program} ${c.division}` : `${c.year} ${c.program}` }));
          courses.sort((a,b) => a.label.localeCompare(b.label));
          faculties = (facRes.data || []).map(f => ({ id: f.id, label: `Prof. ${f.full_name}` }));
          rooms = (rmRes.data || []).filter(r => r.room_code !== 'VIRTUAL').map(r => ({ id: r.id, label: `Room ${r.room_code}` }));
          
          timeSlots = tsRes.data || [];
          masterData = masterRes.data || [];

          initDropdowns();
      } catch (err) {
          toast('Failed to load data: ' + err.message, 'error');
      }
  }

  function initDropdowns() {
      const typeSel = document.getElementById('filterType');
      const label = document.getElementById('entityLabel');

      tsSelect = new TomSelect('#entitySelect', {
          valueField: 'id',
          labelField: 'label',
          searchField: 'label',
          placeholder: 'Select...',
          options: courses
      });

      typeSel.addEventListener('change', (e) => {
          const val = e.target.value;
          
          // Clear current selection completely
          tsSelect.clear();
          tsSelect.clearOptions();
          
          if (val === 'course') {
              label.textContent = 'Select Course';
              tsSelect.addOptions(courses);
          } else if (val === 'faculty') {
              label.textContent = 'Select Faculty';
              tsSelect.addOptions(faculties);
          } else if (val === 'room') {
              label.textContent = 'Select Room';
              tsSelect.addOptions(rooms);
          }
          tsSelect.refreshOptions(false);
      });
  }

  // --- GRID GENERATION ---
  document.getElementById('viewBtn').addEventListener('click', () => {
      const filterType = document.getElementById('filterType').value;
      const entityId = tsSelect.getValue();
      
      if (!entityId) {
          toast(`Please select a ${filterType} first.`, 'warn');
          return;
      }

      // 1. Filter Data
      const filteredMaster = masterData.filter(row => {
          if (filterType === 'course') return row.course_id == entityId;
          if (filterType === 'faculty') return row.faculty_id == entityId;
          if (filterType === 'room') return row.room_id == entityId;
      });

      // 2. Prepare Pivot Matrix [timeSlotId][day]
      const matrix = {};
      const virtualLoad = [];

      timeSlots.forEach(slot => {
          if(slot.day_type === 'saturday') return; 
          matrix[slot.id] = { slot, days: {} };
          daysOfWeek.forEach(d => matrix[slot.id].days[d] = null);
      });

      filteredMaster.forEach(row => {
          if (!row.time_slot_id) {
              virtualLoad.push(row);
          } else if (matrix[row.time_slot_id]) {
              matrix[row.time_slot_id].days[row.day_type] = row;
          }
      });

      currentViewData = { matrix, filterType, entityId };
      currentVirtualData = virtualLoad;
      
      renderGridHTML(matrix, filterType);
      renderVirtualHTML(virtualLoad, filterType);

      document.getElementById('exportExcelBtn').disabled = false;
      document.getElementById('exportPdfBtn').disabled = false;
  });

  function getCourseName(c) {
      if(!c) return '';
      return c.division ? `${c.year} ${c.program} ${c.division}` : `${c.year} ${c.program}`;
  }

  function formatCellText(row, filterType) {
      if(!row) return null;
      let line1 = '', line2 = row.subject?.subject_name || '—', line3 = '';
      
      if (filterType === 'room') {
          line1 = getCourseName(row.course);
          line3 = `Prof. ${row.faculty?.full_name || ''}`;
      } else if (filterType === 'faculty') {
          line1 = getCourseName(row.course);
          line3 = `Room ${row.room?.room_code || ''}`;
      } else if (filterType === 'course') {
          line1 = `Room ${row.room?.room_code || ''}`;
          line3 = `Prof. ${row.faculty?.full_name || ''}`;
      }
      return { line1, line2, line3 };
  }
  
  // Helpers to get correct column headers for exports based on the selected filter
  function getVirtualCol1(filter) {
      if (filter === 'course') return 'Room';
      return 'Course';
  }
  function getVirtualCol2(filter) {
      if (filter === 'faculty') return 'Room';
      return 'Faculty';
  }

  function renderGridHTML(matrix, filterType) {
      let html = `<div class="weekly-grid-wrap">
          <div class="wg-header">
              <div class="wg-th">Time</div>
              ${daysOfWeek.map(d => `<div class="wg-th">${d}</div>`).join('')}
          </div>`;

      // Filter to unique weekday slots to build the rows
      const weekdaySlots = timeSlots.filter(s => s.day_type === 'weekday').sort((a,b) => a.sort_order - b.sort_order);

      weekdaySlots.forEach(slot => {
          const isBreak = slot.slot_type !== 'lecture';
          html += `<div class="wg-row ${isBreak ? 'is-break' : ''}">
              <div class="wg-time">
                  <span class="tl">${slot.slot_label || ''}</span>
                  <span class="tr">${slot.start_time.slice(0,5)} - ${slot.end_time.slice(0,5)}</span>
              </div>`;
          
          if (isBreak) {
              const lbl = slot.slot_type === 'lunch' ? '🍽 LUNCH BREAK' : '☕ RECESS';
              html += `<div class="break-label">${lbl}</div>`;
          } else {
              daysOfWeek.forEach(day => {
                  let rowData = matrix[slot.id]?.days[day];
                  if (!rowData && day === 'saturday') {
                      const satSlot = timeSlots.find(s => s.day_type === 'saturday' && s.start_time === slot.start_time);
                      if(satSlot && matrix[satSlot.id]) rowData = matrix[satSlot.id].days['saturday'];
                  }

                  const text = formatCellText(rowData, filterType);
                  if (text) {
                      html += `<div class="wg-cell filled">
                          <div class="wg-line1">${text.line1}</div>
                          <div class="wg-line2">${text.line2}</div>
                          <div class="wg-line3">${text.line3}</div>
                      </div>`;
                  } else {
                      html += `<div class="wg-cell"></div>`;
                  }
              });
          }
          html += `</div>`;
      });
      html += `</div>`;
      document.getElementById('gridContainer').innerHTML = html;
  }

  function renderVirtualHTML(virtualLoad, filterType) {
      const container = document.getElementById('virtualSection');
      const grid = document.getElementById('virtualGrid');
      
      if (!virtualLoad || virtualLoad.length === 0) {
          container.style.display = 'none';
          return;
      }
      
      container.style.display = 'block';
      let html = '';
      
      virtualLoad.forEach(row => {
          const text = formatCellText(row, filterType);
          const dayCap = row.day_type.charAt(0).toUpperCase() + row.day_type.slice(1);
          const time = (row.virtual_start_time && row.virtual_end_time) ? `${row.virtual_start_time.slice(0,5)} - ${row.virtual_end_time.slice(0,5)}` : 'Flexible';
          
          html += `<div class="v-card">
              <div style="font-size: 0.65rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-bottom: 4px;">${dayCap} &bull; ${time}</div>
              <div class="wg-line1">${text.line1}</div>
              <div class="wg-line2" style="font-size: 0.9rem;">${text.line2}</div>
              <div class="wg-line3">${text.line3}</div>
          </div>`;
      });
      grid.innerHTML = html;
  }

  // --- EXPORT PDF ---
  document.getElementById('exportPdfBtn').addEventListener('click', () => {
      if (!currentViewData) return;
      const { jsPDF } = window.jspdf;
      
      // Using A2 size for large layout fitting onto 1 page
      const doc = new jsPDF({ orientation: 'landscape', unit: 'pt', format: 'a2' });
      const pageW = doc.internal.pageSize.width;
      
      const filterType = currentViewData.filterType;
      const entityName = tsSelect.options[currentViewData.entityId].label;

      const head = [['Time', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday']];
      const body = [];
      const weekdaySlots = timeSlots.filter(s => s.day_type === 'weekday').sort((a,b) => a.sort_order - b.sort_order);

      let dataRowIndex = 0; 

      weekdaySlots.forEach(slot => {
          const timeLabel = slot.slot_type === 'lecture'
              ? `${slot.slot_label || ''}\n\n${slot.start_time.slice(0,5)} - ${slot.end_time.slice(0,5)}`
              : `${slot.slot_label || ''}\n${slot.start_time.slice(0,5)} - ${slot.end_time.slice(0,5)}`;

          if (slot.slot_type !== 'lecture') {
              const lbl = slot.slot_type === 'lunch' ? 'Lunch Break' : 'Recess';
              body.push([
                  { content: timeLabel, styles: { fontStyle: 'bold', valign: 'middle', halign: 'center' } },
                  { content: lbl, colSpan: 6, styles: { halign: 'center', valign: 'middle', fontStyle: 'italic', textColor: [100, 100, 100] } }
              ]);
          } else {
              const rowData = [{ content: timeLabel, styles: { fontStyle: 'bold', valign: 'middle', halign: 'center' } }];
              
              daysOfWeek.forEach(day => {
                  let rData = currentViewData.matrix[slot.id]?.days[day];
                  if (!rData && day === 'saturday') {
                      const satSlot = timeSlots.find(s => s.day_type === 'saturday' && s.start_time === slot.start_time);
                      if(satSlot && currentViewData.matrix[satSlot.id]) rData = currentViewData.matrix[satSlot.id].days['saturday'];
                  }
                  
                  const text = formatCellText(rData, filterType);
                  if (text) {
                      rowData.push({ content: `${text.line1}\n${text.line2}\n${text.line3}`, styles: { halign: 'center', valign: 'middle' } });
                  } else {
                      rowData.push({ content: '', styles: { halign: 'center', valign: 'middle' } });
                  }
              });
              
              rowData._dataRowIndex = dataRowIndex++;
              body.push(rowData);
          }
      });

      doc.autoTable({
          head, body, startY: 230, theme: 'grid',
          // Scaled up for A2
          styles: { fontSize: 14, cellPadding: 12, valign: 'middle', halign: 'center', overflow: 'linebreak', lineColor: [0, 0, 0], lineWidth: 1, textColor: [0,0,0] },
          headStyles: { fillColor: [255, 255, 255], textColor: [0, 0, 0], fontStyle: 'bold', fontSize: 16, halign: 'center' },
          columnStyles: { 0: { cellWidth: 120 } },
          margin: { left: 60, right: 60, bottom: 60 },
          didParseCell: function(data) {
              if (data.section === 'body' && data.column.index > 0 && data.row.raw._dataRowIndex !== undefined) {
                  const idx = data.row.raw._dataRowIndex;
                  if (idx < 3) {
                      data.cell.styles.fillColor = [252, 235, 240]; // Light Pink
                  } else if (idx < 5) {
                      data.cell.styles.fillColor = [235, 245, 255]; // Light Blue
                  } else {
                      data.cell.styles.fillColor = [255, 243, 230]; // Light Peach
                  }
              }
              if (data.section === 'body' && data.row.raw._dataRowIndex === undefined && data.column.index > 0) {
                  data.cell.styles.fillColor = [245, 245, 245];
              }
          },
          didDrawPage(data) {
              if(window._ASES_LOGO_DATA) try { doc.addImage(window._ASES_LOGO_DATA, 'PNG', 60, 40, 160, 160); } catch(e){}
              const cx = pageW / 2;
              doc.setFont('times', 'bold'); doc.setFontSize(36); doc.setTextColor(0, 0, 0);
              doc.text('B. K. Birla College, Kalyan', cx, 80, { align: 'center' });
              doc.setFont('times', 'normal'); doc.setFontSize(20);
              doc.text('(Empowered Autonomous Status)', cx, 110, { align: 'center' });
              doc.setFont('times', 'bolditalic'); doc.setFontSize(24);
              doc.text('Department of Management Studies', cx, 140, { align: 'center' });
              
              doc.setFont('helvetica', 'bold'); doc.setFontSize(22);
              doc.text(`Weekly Timetable — ${filterType.toUpperCase()}: ${entityName}`, cx, 190, { align: 'center' });
              doc.setFont('helvetica', 'normal'); doc.setFontSize(14); doc.setTextColor(100);
              doc.text(`Generated On: ${new Date().toLocaleString('en-IN')}`, 60, doc.internal.pageSize.height - 30);
          }
      });

      // Export Virtual Lectures
      if (currentVirtualData && currentVirtualData.length > 0) {
          let currentY = doc.lastAutoTable.finalY + 40;
          
          doc.setFont('helvetica', 'bold'); doc.setFontSize(20); doc.setTextColor(0,0,0);
          doc.text('Virtual / Flexible Load', 60, currentY);

          const col1Name = getVirtualCol1(filterType);
          const col2Name = getVirtualCol2(filterType);

          const vBody = currentVirtualData.map(row => {
              const text = formatCellText(row, filterType);
              const dayCap = row.day_type.charAt(0).toUpperCase() + row.day_type.slice(1);
              const time = (row.virtual_start_time && row.virtual_end_time) ? `${row.virtual_start_time.slice(0,5)} - ${row.virtual_end_time.slice(0,5)}` : 'Flexible';
              return [dayCap, time, text.line1, text.line2, text.line3];
          });

          doc.autoTable({
              head: [['Day', 'Time', col1Name, 'Subject', col2Name]],
              body: vBody,
              startY: currentY + 20,
              theme: 'grid',
              styles: { fontSize: 14, cellPadding: 12, valign: 'middle', lineColor: [0, 0, 0], lineWidth: 1 },
              headStyles: { fillColor: [240, 240, 240], textColor: [0, 0, 0], fontStyle: 'bold', fontSize: 16 },
              margin: { left: 60, right: 60 }
          });
      }

      doc.save(`Weekly_Timetable_${entityName}.pdf`);
  });

  // --- EXPORT EXCEL ---
  document.getElementById('exportExcelBtn').addEventListener('click', () => {
      if (!currentViewData) return;
      const filterType = currentViewData.filterType;
      const entityName = tsSelect.options[currentViewData.entityId].label;
      const wsData = []; const merges = [];
      
      wsData.push([`Weekly Timetable - ${filterType.toUpperCase()}: ${entityName}`]);
      wsData.push([]);
      
      const headRow = ['Time', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      wsData.push(headRow);

      let rowIndex = 2;
      const weekdaySlots = timeSlots.filter(s => s.day_type === 'weekday').sort((a,b) => a.sort_order - b.sort_order);

      weekdaySlots.forEach(slot => {
          const timeLabel = slot.slot_type === 'lecture'
              ? `${slot.slot_label || ''}\n${slot.start_time.slice(0,5)} - ${slot.end_time.slice(0,5)}`
              : `${slot.slot_label || ''}\n${slot.start_time.slice(0,5)} - ${slot.end_time.slice(0,5)}`;

          if (slot.slot_type !== 'lecture') {
              const lbl = slot.slot_type === 'lunch' ? 'Lunch Break' : 'Recess';
              const row = [timeLabel, lbl];
              for(let i=1; i<6; i++) row.push('');
              wsData.push(row);
              merges.push({ s: {r: rowIndex, c: 1}, e: {r: rowIndex, c: 6} });
              rowIndex += 1;
          } else {
              const row1 = [timeLabel], row2 = [''], row3 = [''];
              
              daysOfWeek.forEach(day => {
                  let rData = currentViewData.matrix[slot.id]?.days[day];
                  if (!rData && day === 'saturday') {
                      const satSlot = timeSlots.find(s => s.day_type === 'saturday' && s.start_time === slot.start_time);
                      if(satSlot && currentViewData.matrix[satSlot.id]) rData = currentViewData.matrix[satSlot.id].days['saturday'];
                  }
                  
                  const text = formatCellText(rData, filterType);
                  if(text) {
                      row1.push(text.line1); row2.push(text.line2); row3.push(text.line3);
                  } else {
                      row1.push('-'); row2.push(''); row3.push('');
                  }
              });

              wsData.push(row1, row2, row3);
              merges.push({ s: {r: rowIndex, c: 0}, e: {r: rowIndex+2, c: 0} });
              rowIndex += 3;
          }
      });

      if (currentVirtualData && currentVirtualData.length > 0) {
          const col1Name = getVirtualCol1(filterType);
          const col2Name = getVirtualCol2(filterType);

          wsData.push([], ['Virtual / Flexible Load']);
          wsData.push(['Day', 'Time', col1Name, 'Subject', col2Name]);
          currentVirtualData.forEach(row => {
              const text = formatCellText(row, filterType);
              const dayCap = row.day_type.charAt(0).toUpperCase() + row.day_type.slice(1);
              const time = (row.virtual_start_time && row.virtual_end_time) ? `${row.virtual_start_time.slice(0,5)} - ${row.virtual_end_time.slice(0,5)}` : 'Flexible';
              wsData.push([dayCap, time, text.line1, text.line2, text.line3]);
          });
      }

      const ws = XLSX.utils.aoa_to_sheet(wsData);
      ws['!merges'] = merges;
      ws['!cols'] = [{ wch: 15 }, { wch: 20 }, { wch: 20 }, { wch: 20 }, { wch: 20 }, { wch: 20 }, { wch: 20 }];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Weekly TT");
      XLSX.writeFile(wb, `Weekly_Timetable_${entityName}.xlsx`);
  });

  loadBaseData();
</script>
</body>
</html>
