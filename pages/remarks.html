<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Remarks | ASES</title>
    <link rel="stylesheet" href="../css/theme.css">
    
    <style>
        /* --- Form Grid & Spacing --- */
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-group label { font-weight: 600; font-size: 0.9rem; color: var(--text-primary); }
        
        .form-control {
            padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-main); color: var(--text-primary); font-family: var(--ff-body);
            font-size: 0.95rem; transition: all 0.2s ease; width: 100%; box-sizing: border-box;
        }
        .form-control:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(79, 106, 245, 0.1); }
        textarea.form-control { resize: vertical; min-height: 80px; }

        /* --- Custom Autocomplete --- */
        .autocomplete-wrapper { position: relative; width: 100%; }
        .suggestions-list {
            position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card); 
            border: 1px solid var(--border); border-radius: 8px; max-height: 200px; 
            overflow-y: auto; z-index: 1000; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            list-style: none; padding: 0; margin: 0.25rem 0 0 0; display: none; 
        }
        .suggestions-list.active { display: block; }
        .suggestions-list li {
            padding: 0.75rem 1rem; cursor: pointer; border-bottom: 1px solid var(--border);
            font-size: 0.9rem; color: var(--text-primary); transition: background 0.2s;
        }
        .suggestions-list li:last-child { border-bottom: none; }
        .suggestions-list li:hover { background: rgba(79, 106, 245, 0.05); color: var(--accent); }

        /* --- Table Controls & UI --- */
        .remarks-log-card { margin-top: 2rem; padding: 1.5rem; }
        .table-header-flex {
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
            padding-bottom: 1rem; border-bottom: 1px solid var(--border);
        }
        .table-header-flex h3 { margin: 0; font-size: 1.25rem; }
        .table-controls { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        
        .control-input, .control-select {
            padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-main); color: var(--text-primary); font-family: var(--ff-body); 
            font-size: 0.9rem; outline: none; transition: all 0.2s;
        }
        .control-input:focus, .control-select:focus { border-color: var(--accent); }
        .control-input { width: 260px; }
        
        .btn-export {
            display: inline-flex; align-items: center; gap: 0.5rem; background: var(--success, #10b981); 
            color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; 
            font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-size: 0.9rem;
        }
        .btn-export:hover { background: #059669; transform: translateY(-1px); }
        .btn-export svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        
        /* Action buttons */
        .btn-action-icon {
            background: none; border: none; cursor: pointer; padding: 6px; border-radius: 6px;
            display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .btn-action-icon.delete { color: var(--danger, #ef4444); }
        .btn-action-icon.delete:hover { background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>

    <aside class="sidebar">
      <div class="sidebar-college" id="sidebarCollege"></div>
      <nav id="sideNav"></nav>
      <div class="sidebar-footer">
        <div class="theme-row">
          <span class="theme-label"><span id="themeIcon"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span><span id="themeLabel">Light mode</span></span>
          <label class="toggle-switch"><input type="checkbox" id="themeToggle"/><span class="toggle-track"></span></label>
        </div>
        <div class="user-pill">
          <div class="user-avatar" id="userAvatar">?</div>
          <div class="user-info"><div class="user-name" id="userName">…</div><div class="user-role" id="userRole">admin</div></div>
          <button class="btn-logout" id="logoutBtn" title="Sign out"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
        </div>
      </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div>
                <h1 class="page-title">Faculty Remarks</h1>
                <p class="page-subtitle">Manage and view extra faculty activity logs.</p>
            </div>
        </div>

        <div class="content">
            <div class="card">
                <h3 style="margin-top: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem;">Add New Remark</h3>
                <form id="remark-form" class="grid-form">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="remark-date" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Faculty</label>
                        <div class="autocomplete-wrapper">
                            <input type="text" id="faculty-search" class="form-control" placeholder="Type to search faculty..." autocomplete="off" required>
                            <ul id="faculty-suggestions" class="suggestions-list"></ul>
                            <input type="hidden" id="selected-faculty-id" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="time" id="start-time" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="time" id="end-time" class="form-control" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Remark</label>
                        <textarea id="remark-text" class="form-control" rows="3" required placeholder="Enter details about the extra activity..."></textarea>
                    </div>
                    <div class="form-actions full-width" style="margin-top: 0.5rem;">
                        <button type="submit" class="btn btn-primary" style="padding: 0.75rem 2rem; font-size: 1rem;">Save Remark</button>
                    </div>
                </form>
            </div>

            <div class="card remarks-log-card">
                <div class="table-header-flex">
                    <h3>Remarks Log</h3>
                    <div class="table-controls">
                        <input type="text" id="table-search-input" class="control-input" placeholder="Search logs...">
                        <select id="sort-select" class="control-select">
                            <option value="date-desc">Newest First</option>
                            <option value="date-asc">Oldest First</option>
                            <option value="name-asc">Faculty (A-Z)</option>
                        </select>
                        <button id="export-btn" class="btn-export">
                            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            Export CSV
                        </button>
                    </div>
                </div>

                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Faculty</th>
                                <th>Remark</th>
                                <th style="width: 80px; text-align: center;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="remarks-tbody">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 3rem; color: var(--text-muted);">Loading remarks...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="../js/modules/remarksManager.js"></script>
</body>
</html>
