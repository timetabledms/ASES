<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Remarks | ASES</title>
    <link rel="stylesheet" href="../css/theme.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar Injection -->
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div class="page-header">
                <h1>Faculty Remarks</h1>
                <p>Manage and view extra faculty activity logs.</p>
            </div>

            <!-- Input Section -->
            <div class="card">
                <h3>Add New Remark</h3>
                <form id="remark-form" class="grid-form">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="remark-date" required>
                    </div>
                    <div class="form-group">
                        <label>Faculty</label>
                        <select id="faculty-select" required>
                            <option value="">Select Faculty...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="time" id="start-time" required>
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="time" id="end-time" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Remark</label>
                        <textarea id="remark-text" rows="3" required placeholder="Enter details..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Remark</button>
                    </div>
                </form>
            </div>

            <!-- Data Display Section -->
            <div class="card">
                <h3>Remarks Log</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Faculty</th>
                            <th>Remark</th>
                        </tr>
                    </thead>
                    <tbody id="remarks-tbody">
                        <tr>
                            <td colspan="4">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module" src="../js/config/supabase.js"></script>
    <script type="module" src="../js/components/sidebar.js"></script>
    <script type="module" src="../js/modules/remarksManager.js"></script>
</body>
</html>
