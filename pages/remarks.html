<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Remarks | ASES</title>
    <link rel="stylesheet" href="../css/theme.css">
    
    <style>
        /* Add some spacing between the cards */
        .remarks-log-card {
            margin-top: 2rem;
        }
        
        /* Ensures the textarea fits the theme */
        textarea {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-family: var(--ff-body);
            color: var(--text-primary);
            resize: vertical;
        }
        textarea:focus {
            border-color: var(--accent);
            outline: none;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
      <div class="sidebar-college" id="sidebarCollege"></div>
      <nav id="sideNav"></nav>
      <div class="sidebar-footer">
        <div class="theme-row">
          <span class="theme-label">
            <span id="themeIcon">
                <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </span>
            <span id="themeLabel">Light mode</span>
          </span>
          <label class="toggle-switch">
            <input type="checkbox" id="themeToggle"/>
            <span class="toggle-track"></span>
          </label>
        </div>
        <div class="user-pill">
          <div class="user-avatar" id="userAvatar">?</div>
          <div class="user-info">
            <div class="user-name" id="userName">…</div>
            <div class="user-role" id="userRole">admin</div>
          </div>
          <button class="btn-logout" id="logoutBtn" title="Sign out">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div>
                <h1 class="page-title">Faculty Remarks</h1>
                <p class="page-subtitle">Manage and view extra faculty activity logs.</p>
            </div>
        </div>

        <div class="content">
            <div class="card">
                <h3>Add New Remark</h3>
                <form id="remark-form" class="grid-form">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="remark-date" required>
                    </div>
                    <div class="form-group">
                        <label>Faculty</label>
                        <select id="faculty-select" required>
                            <option value="">Select Faculty...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="time" id="start-time" required>
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="time" id="end-time" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Remark</label>
                        <textarea id="remark-text" rows="3" required placeholder="Enter details about the extra activity..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Remark</button>
                    </div>
                </form>
            </div>

            <div class="card remarks-log-card">
                <h3>Remarks Log</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Faculty</th>
                            <th>Remark</th>
                        </tr>
                    </thead>
                    <tbody id="remarks-tbody">
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 2rem;">Loading remarks...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module" src="../js/modules/remarksManager.js"></script>
</body>
</html>
