<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Remarks | ASES</title>
    <link rel="stylesheet" href="../css/theme.css">
    
    <style>
        .remarks-log-card { margin-top: 2rem; }
        
        textarea {
            width: 100%; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; padding: 0.75rem 1rem; font-family: var(--ff-body);
            color: var(--text-primary); resize: vertical; outline: none; transition: border-color 0.2s;
        }
        textarea:focus { border-color: var(--accent); }

        /* UI/UX Enhancements for Table Controls */
        .table-header-flex {
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
        }
        .table-controls {
            display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
        }
        .control-input, .control-select {
            padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-main); color: var(--text-primary);
            font-family: var(--ff-body); font-size: 0.9rem; outline: none; transition: border-color 0.2s;
        }
        .control-input:focus, .control-select:focus { border-color: var(--accent); }
        .control-input { width: 250px; }
        
        .btn-export {
            display: flex; align-items: center; gap: 0.5rem; background: var(--success, #10b981); 
            color: white; border: none; padding: 0.6rem 1rem; border-radius: 8px; 
            font-weight: 600; cursor: pointer; transition: opacity 0.2s; font-size: 0.9rem;
        }
        .btn-export:hover { opacity: 0.9; }
        .btn-export svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <aside class="sidebar">
      <div class="sidebar-college" id="sidebarCollege"></div>
      <nav id="sideNav"></nav>
      <div class="sidebar-footer">
        <div class="theme-row">
          <span class="theme-label"><span id="themeIcon"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span><span id="themeLabel">Light mode</span></span>
          <label class="toggle-switch"><input type="checkbox" id="themeToggle"/><span class="toggle-track"></span></label>
        </div>
        <div class="user-pill">
          <div class="user-avatar" id="userAvatar">?</div>
          <div class="user-info"><div class="user-name" id="userName">…</div><div class="user-role" id="userRole">admin</div></div>
          <button class="btn-logout" id="logoutBtn" title="Sign out"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
        </div>
      </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div>
                <h1 class="page-title">Faculty Remarks</h1>
                <p class="page-subtitle">Manage and view extra faculty activity logs.</p>
            </div>
        </div>

        <div class="content">
            <div class="card">
                <h3>Add New Remark</h3>
                <form id="remark-form" class="grid-form">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="remark-date" required>
                    </div>
                    <div class="form-group">
                        <label>Faculty</label>
                        <select id="faculty-select" required>
                            <option value="">Select Faculty...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="time" id="start-time" required>
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="time" id="end-time" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Remark</label>
                        <textarea id="remark-text" rows="3" required placeholder="Enter details about the extra activity..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Remark</button>
                    </div>
                </form>
            </div>

            <div class="card remarks-log-card">
                
                <div class="table-header-flex">
                    <h3>Remarks Log</h3>
                    <div class="table-controls">
                        <input type="text" id="search-input" class="control-input" placeholder="Search faculty or keyword...">
                        <select id="sort-select" class="control-select">
                            <option value="date-desc">Newest First</option>
                            <option value="date-asc">Oldest First</option>
                            <option value="name-asc">Faculty (A-Z)</option>
                        </select>
                        <button id="export-btn" class="btn-export">
                            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            Export CSV
                        </button>
                    </div>
                </div>

                <div style="overflow-x: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Faculty</th>
                                <th>Remark</th>
                            </tr>
                        </thead>
                        <tbody id="remarks-tbody">
                            <tr>
                                <td colspan="4" style="text-align: center; padding: 2rem;">Loading remarks...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="../js/modules/remarksManager.js"></script>
</body>
</html>
